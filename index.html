<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexa · Gestión — v0.30</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{ --pri:#2563eb; --pri-d:#1d4ed8; --gris:#64748b; --bg:#f1f5f9; --card:#fff; --bord:#e2e8f0;
         --rojo:#dc2626; --ok:#16a34a; --warn:#d97706; --dark:#0f172a; }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--dark); font-size:14px; }
  a{ color:var(--pri); }
  .hidden{ display:none !important; }
  /* Login */
  #login{ min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-card{ background:#fff; border:1px solid var(--bord); border-radius:18px; padding:30px; width:340px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
  .marca{ font-weight:800; font-size:30px; letter-spacing:1px; color:var(--pri-d); text-align:center; }
  .marca-sub{ text-align:center; color:var(--gris); font-size:13px; margin-bottom:20px; }
  input,select,textarea{ width:100%; border:2px solid var(--bord); border-radius:10px; padding:11px; font-size:15px; font-family:inherit; background:#fff; }
  input[type=checkbox],input[type=radio]{ width:auto; padding:0; margin:0 6px 0 0; vertical-align:middle; }
  input:focus,select:focus,textarea:focus{ outline:none; border-color:var(--pri); }
  label.l{ display:block; font-size:12px; font-weight:700; color:var(--gris); text-transform:uppercase; letter-spacing:.4px; margin:12px 0 5px; }
  .btn{ border:none; border-radius:10px; padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer; }
  .btn-pri{ background:var(--pri); color:#fff; } .btn-pri:active{ background:var(--pri-d); }
  .btn-2{ background:#fff; color:#334155; border:2px solid var(--bord); }
  .btn-ok{ background:var(--ok); color:#fff; } .btn-x{ background:#fff; color:var(--rojo); border:2px solid #fecaca; }
  .btn:disabled{ opacity:.5; cursor:not-allowed; }
  /* Shell */
  #app{ display:flex; min-height:100vh; }
  .side{ width:210px; background:var(--dark); color:#cbd5e1; flex:0 0 auto; padding:16px 0; position:sticky; top:0; height:100vh; }
  .side .logo{ color:#fff; font-weight:800; font-size:22px; letter-spacing:1px; padding:0 18px 14px; }
  .nav a{ display:flex; gap:10px; align-items:center; padding:11px 18px; color:#cbd5e1; text-decoration:none; font-weight:600; cursor:pointer; }
  .nav a:hover{ background:#1e293b; color:#fff; }
  .nav a.on{ background:var(--pri); color:#fff; }
  .side .user{ position:absolute; bottom:0; width:100%; padding:14px 18px; border-top:1px solid #1e293b; font-size:12px; color:#94a3b8; }
  .main{ flex:1; padding:22px 26px; max-width:100%; overflow-x:auto; }
  h1{ font-size:22px; margin:0 0 4px; } .sub{ color:var(--gris); margin:0 0 18px; }
  /* Cards / KPIs */
  .kpis{ display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; }
  .kpi{ background:#fff; border:1px solid var(--bord); border-radius:14px; padding:16px; }
  .kpi .n{ font-size:30px; font-weight:800; } .kpi .t{ color:var(--gris); font-size:13px; margin-top:2px; }
  .kpi.b{ border-left:4px solid var(--pri); } .kpi.g{ border-left:4px solid var(--ok); }
  .kpi.r{ border-left:4px solid var(--rojo); } .kpi.w{ border-left:4px solid var(--warn); }
  .kpi-link{ cursor:pointer; transition:.12s; } .kpi-link:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(37,99,235,.13); }
  /* Tabla */
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
  .toolbar input,.toolbar select{ width:auto; min-width:120px; padding:9px; }
  table{ width:100%; border-collapse:collapse; background:#fff; border:1px solid var(--bord); border-radius:12px; overflow:hidden; }
  th,td{ text-align:left; padding:10px 12px; border-bottom:1px solid var(--bord); font-size:13px; }
  th{ background:#f8fafc; color:var(--gris); font-size:12px; text-transform:uppercase; letter-spacing:.3px; }
  tr:hover td{ background:#f8fafc; cursor:pointer; }
  .pill{ display:inline-block; border-radius:999px; padding:2px 9px; font-size:11px; font-weight:700; }
  .p-activo{ background:#dcfce7; color:#166534; } .p-bloqueado{ background:#fee2e2; color:#991b1b; }
  .p-baja{ background:#f1f5f9; color:#475569; } .p-prospecto{ background:#dbeafe; color:#1e40af; }
  .p-suspendido,.p-moroso{ background:#fef3c7; color:#92400e; }
  .p-PENDIENTE{ background:#fef3c7; color:#92400e; } .p-ASIGNADA{ background:#dbeafe; color:#1e40af; }
  .p-EN_CURSO{ background:#e0e7ff; color:#3730a3; } .p-FINALIZADA{ background:#dcfce7; color:#166534; }
  .p-CERRADA_TECNICO{ background:#cffafe; color:#155e75; } .p-CANCELADA,.p-NO_REALIZADA{ background:#fee2e2; color:#991b1b; }
  .empresa-tag{ font-size:11px; color:var(--gris); }
  .pag{ display:flex; gap:8px; align-items:center; margin-top:12px; }
  /* Modal */
  .ov{ position:fixed; inset:0; background:rgba(15,23,42,.5); display:flex; align-items:center; justify-content:center; padding:16px; z-index:50; }
  .modal{ background:#fff; border-radius:16px; padding:22px; width:560px; max-width:100%; max-height:90vh; overflow:auto; }
  .modal.wide{ width:920px; }
  .modal h2{ margin:0 0 4px; font-size:19px; } .row{ display:flex; gap:10px; } .row>div{ flex:1; }
  .ficha-row{ display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--bord); }
  .ficha-row .k{ color:var(--gris); } .ficha-row .v{ font-weight:600; text-align:right; }
  .toast{ position:fixed; bottom:18px; right:18px; background:var(--dark); color:#fff; padding:12px 16px; border-radius:10px; z-index:99; opacity:0; transition:.2s; }
  .toast.show{ opacity:1; }
  .muted{ color:var(--gris); } .center{ text-align:center; padding:30px; color:var(--gris); }
  .spin{ display:inline-block; width:26px; height:26px; border:3px solid #e2e8f0; border-top-color:var(--pri); border-radius:50%; animation:sp 1s linear infinite; }
  @keyframes sp{ to{ transform:rotate(360deg); } }
  #map{ height:calc(100vh - 170px); min-height:420px; border:1px solid var(--bord); border-radius:12px; }
  .leaflet-container{ font:inherit; }
  /* Dashboard estilo FG */
  .dash-hero{ background:#fff; border:1px solid var(--bord); border-radius:16px; padding:20px 24px; display:flex; justify-content:space-between; align-items:center; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
  .dash-saludo{ font-size:24px; font-weight:800; }
  .dash-fecha{ color:var(--gris); font-size:13px; margin-top:4px; text-transform:capitalize; }
  .dash-reloj{ font-size:34px; font-weight:800; color:var(--pri); font-variant-numeric:tabular-nums; }
  .qa-row{ display:grid; grid-template-columns:repeat(auto-fill,minmax(108px,1fr)); gap:10px; margin-bottom:18px; }
  .qa{ background:#fff; border:1px solid var(--bord); border-radius:14px; padding:14px 8px; text-align:center; cursor:pointer; transition:.12s; }
  .qa:hover{ transform:translateY(-2px); box-shadow:0 6px 16px rgba(37,99,235,.13); border-color:var(--pri); }
  .qa .ico{ font-size:22px; } .qa .lbl{ font-size:12px; font-weight:700; margin-top:5px; color:#334155; }
  .dash-sec{ font-size:15px; font-weight:800; margin:20px 0 10px; }
</style>
</head>
<body>

<!-- ───────── LOGIN ───────── -->
<div id="login">
  <div class="login-card">
    <div class="marca">NEXA</div>
    <div class="marca-sub">Gestión · v0.30</div>
    <label class="l">Usuario</label>
    <input id="lg-user" placeholder="usuario" autocapitalize="off">
    <label class="l">PIN</label>
    <input id="lg-pin" type="password" placeholder="••••">
    <div id="lg-err" style="color:var(--rojo);font-size:13px;min-height:18px;margin-top:8px"></div>
    <button class="btn btn-pri" id="lg-btn" style="width:100%;margin-top:6px">Entrar</button>
  </div>
</div>

<!-- ───────── APP ───────── -->
<div id="app" class="hidden">
  <div class="side">
    <div class="logo">NEXA</div>
    <div class="nav" id="nav">
      <a data-v="dashboard" class="on">📊 Dashboard</a>
      <a data-v="clientes">👥 Clientes</a>
      <a data-v="solicitudes">📥 Solicitudes</a>
      <a data-v="ordenes">🛠️ Órdenes de trabajo</a>
      <a data-v="deposito">📦 Depósito / Stock</a>
      <a data-v="cuadrillas-adm">🔧 Cuadrillas</a>
      <a data-v="manoobra">🧰 Tipos de trabajo</a>
      <a data-v="cuentastv">📺 Cuentas TV</a>
      <a data-v="cobertura">📍 Cobertura / Red</a>
      <a data-v="usuarios" id="nav-usuarios" style="display:none">👤 Usuarios</a>
    </div>
    <div class="user" id="side-user"></div>
  </div>
  <div class="main" id="view"></div>
</div>

<div id="toast" class="toast"></div>

<script>
(function(){
  'use strict';
  var SB_URL='https://xlfntplfhdjoqrofhcwe.supabase.co';
  var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsZm50cGxmaGRqb3Fyb2ZoY3dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTIyMjEsImV4cCI6MjA5NjUyODIyMX0.7uqzHQyrir23uCQ_GUabvX5kavr3VC_6UzaOizdZJI4';
  var H={ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };
  var VER='v0.30';

  // ── REST helpers ──
  function sbGet(path){ return fetch(SB_URL+'/rest/v1/'+path,{headers:H}).then(function(r){return r.json();}); }
  function sbCount(path){
    return fetch(SB_URL+'/rest/v1/'+path,{headers:Object.assign({},H,{'Prefer':'count=exact','Range':'0-0'})})
      .then(function(r){ var cr=r.headers.get('content-range')||'/0'; return parseInt(cr.split('/')[1])||0; });
  }
  function sbPost(path,body){ return fetch(SB_URL+'/rest/v1/'+path,{method:'POST',headers:Object.assign({},H,{'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(body)}).then(function(r){return r.json();}); }
  function sbPatch(path,body){ return fetch(SB_URL+'/rest/v1/'+path,{method:'PATCH',headers:Object.assign({},H,{'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(body)}).then(function(r){return r.json();}); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
  function pill(estado){ return '<span class="pill p-'+esc(estado)+'">'+esc(estado)+'</span>'; }

  var USER=null, REF={ empresas:[], barrios:[], planes:[], cuadrillas:[], motivos:[], tiposTrab:[] };

  // ── LOGIN ──
  function login(){
    var u=document.getElementById('lg-user').value.trim();
    var p=document.getElementById('lg-pin').value.trim();
    var err=document.getElementById('lg-err');
    if(!u||!p){ err.textContent='Completá usuario y PIN.'; return; }
    document.getElementById('lg-btn').disabled=true;
    sbGet('usuarios?email=eq.'+encodeURIComponent(u)+'&activo=eq.true&select=*&limit=1').then(function(d){
      document.getElementById('lg-btn').disabled=false;
      if(Array.isArray(d)&&d.length&&String(d[0].pin)===p){ USER=d[0]; try{ var _su=Object.assign({},USER); delete _su.pin; localStorage.setItem('nexa_sesion', JSON.stringify({u:_su,t:Date.now()})); }catch(e){} iniciar(); }
      else err.textContent='Usuario o PIN incorrecto.';
    }).catch(function(){ document.getElementById('lg-btn').disabled=false; err.textContent='Error de conexión.'; });
  }

  function iniciar(){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('side-user').innerHTML = esc(USER.nombre)+'<br><span style="color:#64748b">'+esc(USER.rol)+'</span> · '+VER+' · <a href="#" id="logout" style="color:#94a3b8;text-decoration:underline">Salir</a>';
    var _lo=document.getElementById('logout'); if(_lo) _lo.addEventListener('click',function(e){ e.preventDefault(); try{ localStorage.removeItem('nexa_sesion'); }catch(_){} location.reload(); });
    if(USER.rol==='superadmin'){ var nu=document.getElementById('nav-usuarios'); if(nu) nu.style.display=''; }
    // precargar referencias
    Promise.all([
      sbGet('empresas?select=*&order=nombre'),
      sbGet('barrios?select=*&order=nombre'),
      sbGet('planes?select=*&order=bajada_mbps'),
      sbGet('cuadrillas?select=*&activa=eq.true&order=nombre'),
      sbGet('motivos_ot?select=*&activo=eq.true&order=orden'),
      sbGet('tipos_trabajo?select=*&activo=eq.true&order=orden')
    ]).then(function(r){ REF.empresas=r[0]||[]; REF.barrios=r[1]||[]; REF.planes=r[2]||[]; REF.cuadrillas=r[3]||[]; REF.motivos=r[4]||[]; REF.tiposTrab=r[5]||[]; ir('dashboard'); });
  }

  // ── NAV ──
  document.getElementById('nav').addEventListener('click',function(e){
    var a=e.target.closest('a[data-v]'); if(!a) return;
    Array.prototype.forEach.call(this.querySelectorAll('a'),function(x){x.classList.remove('on');});
    a.classList.add('on'); ir(a.getAttribute('data-v'));
  });
  function ir(v){ ({dashboard:vDashboard,clientes:vClientes,solicitudes:vSolicitudes,ordenes:vOrdenes,deposito:vDeposito,'cuadrillas-adm':vCuadrillas,manoobra:vTiposTrabajo,cuentastv:vCuentasTV,cobertura:vCobertura,usuarios:vUsuarios}[v]||vDashboard)(); }
  function setNav(v){ Array.prototype.forEach.call(document.querySelectorAll('#nav a'),function(x){ x.classList.toggle('on', x.getAttribute('data-v')===v); }); }
  function navTo(v){ setNav(v); ir(v); }
  // accesos directos desde las tarjetas KPI del dashboard
  function goKpi(act){
    var p=String(act).split('|'); var v=p[0];
    if(v==='cl'){
      clState={ q:'', estado:'', empresa:'', barrio:'', pend:false, page:0, size:50, total:0 };
      if(p[1]==='pend') clState.pend=true;
      else if(p[1]){ var kv=p[1].split('='); clState[kv[0]]=kv[1]; }
      navTo('clientes');
    } else if(v==='sol'){ navTo('solicitudes'); }
    else if(v==='ot'){ otState.estado=p[1]||''; otState.tipo=p[2]||''; otState.page=0; navTo('ordenes'); }
  }
  var view=document.getElementById('view');
  function loading(){ view.innerHTML='<div class="center"><div class="spin"></div></div>'; }

  // ── DASHBOARD ── (estilo FG: saludo + reloj, accesos rápidos, KPIs, pendientes por tipo, antigüedad)
  var _clockTimer=null;
  function _saludo(h){ return h<12?'Buenos días':(h<20?'Buenas tardes':'Buenas noches'); }
  function _hhmm(n){ return ('0'+n.getHours()).slice(-2)+':'+('0'+n.getMinutes()).slice(-2); }
  function _tick(){ var e=document.getElementById('dash-clock'); if(!e){ if(_clockTimer){clearInterval(_clockTimer);_clockTimer=null;} return; } e.textContent=_hhmm(new Date()); }
  function vDashboard(){
    loading();
    Promise.all([
      sbCount('clientes?select=id'), sbCount('clientes?estado=eq.activo&select=id'),
      sbCount('clientes?estado=eq.bloqueado&select=id'), sbCount('clientes?estado=eq.baja&select=id'),
      sbCount('clientes?empresa=eq.'+encodeURIComponent('FG Conexiones')+'&select=id'),
      sbCount('clientes?empresa=eq.NOR-TEL&select=id'), sbCount('clientes?empresa=eq.Nexa&select=id'),
      sbCount('solicitudes_alta?estado=eq.pendiente&select=id'),
      sbCount('ordenes_trabajo?estado=eq.ASIGNADA&select=id'), sbCount('ordenes_trabajo?estado=eq.EN_CURSO&select=id'),
      sbCount('ordenes_trabajo?estado=eq.FINALIZADA&select=id'),
      sbCount('clientes?codigo_ispcube=is.null&estado=neq.baja&select=id'),
      sbGet('ordenes_trabajo?estado=eq.PENDIENTE&select=tipo,created_at&limit=2000')
    ]).then(function(c){
      var pend=Array.isArray(c[12])?c[12]:[], totalPend=pend.length;
      var porTipo={}; pend.forEach(function(o){ porTipo[o.tipo]=(porTipo[o.tipo]||0)+1; });
      var ahora=Date.now(), ag={a:0,b:0,d:0}; pend.forEach(function(o){ var hs=(ahora-new Date(o.created_at).getTime())/3600000; if(hs<24)ag.a++; else if(hs<72)ag.b++; else ag.d++; });
      var now=new Date(), nombre=(USER.nombre||'').split(' ')[0];
      var qa=[['🛠️','Nueva OT','nuevaOT'],['📋','Órdenes','ordenes'],['👥','Clientes','clientes'],['📥','Solicitudes','solicitudes'],['📦','Depósito','deposito'],['🔧','Cuadrillas','cuadrillas-adm'],['📍','Cobertura','cobertura'],['⚠️','ISPcube','isp']];
      var tipos=[['INSTALACION','🔧 Instalaciones'],['REPARACION','🛠️ Reparac./Servis'],['DESCONEXION','🔌 Desconexiones'],['RETIRO_EQUIPOS','📦 Retiros'],['RECONEXION','🔁 Reconexiones'],['OTRO','⚙️ Otros']];
      view.innerHTML=
        '<div class="dash-hero"><div><div class="dash-saludo">'+_saludo(now.getHours())+', '+esc(nombre)+'</div><div class="dash-fecha">'+esc(now.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}))+' · Nexa SAS · Posadas, Misiones</div></div><div class="dash-reloj" id="dash-clock">'+_hhmm(now)+'</div></div>'
        +'<div class="qa-row">'+qa.map(function(q){ return '<div class="qa" data-qa="'+q[2]+'"><div class="ico">'+q[0]+'</div><div class="lbl">'+q[1]+'</div></div>'; }).join('')+'</div>'
        +'<div class="kpis">'
          +kpi(c[0],'Clientes','b','cl')+kpi(c[1],'Activos','g','cl|estado=activo')+kpi(c[2],'Bloqueados','r','cl|estado=bloqueado')+kpi(c[3],'Baja','','cl|estado=baja')
          +kpi(c[7],'Solicitudes pend.','w','sol')+kpi(totalPend,'OT pendientes','w','ot|PENDIENTE')+kpi(c[8],'OT asignadas','b','ot|ASIGNADA')+kpi(c[9],'En curso','b','ot|EN_CURSO')+kpi(c[10],'Finalizadas','g','ot|FINALIZADA')+kpi(c[11],'⚠️ Falta ISPcube','r','cl|pend')
        +'</div>'
        +'<div class="dash-sec">OT pendientes por tipo</div><div class="kpis">'
          +tipos.map(function(t){ return kpi(porTipo[t[0]]||0,t[1],'w','ot|PENDIENTE|'+t[0]); }).join('')
        +'</div>'
        +'<div class="dash-sec">Antigüedad de pendientes</div><div class="kpis">'
          +kpi(ag.a,'&lt; 24 hs','g')+kpi(ag.b,'24 a 72 hs','w')+kpi(ag.d,'&gt; 72 hs ⚠️','r')
        +'</div>'
        +'<div class="dash-sec">Clientes por empresa</div><div class="kpis">'+kpi(c[4],'FG Conexiones','','cl|empresa=FG Conexiones')+kpi(c[5],'NOR-TEL','','cl|empresa=NOR-TEL')+kpi(c[6],'Nexa','','cl|empresa=Nexa')+'</div>';
      Array.prototype.forEach.call(view.querySelectorAll('.kpi-link'),function(el){ el.addEventListener('click',function(){ goKpi(el.getAttribute('data-act')); }); });
      Array.prototype.forEach.call(view.querySelectorAll('.qa'),function(el){ el.addEventListener('click',function(){ var a=el.getAttribute('data-qa'); if(a==='nuevaOT') nuevaOT(null); else if(a==='isp') goKpi('cl|pend'); else navTo(a); }); });
      if(_clockTimer) clearInterval(_clockTimer); _clockTimer=setInterval(_tick,1000);
    });
  }
  function kpi(n,t,cls,act){ return '<div class="kpi '+(cls||'')+(act?' kpi-link':'')+'"'+(act?' data-act="'+esc(act)+'"':'')+'><div class="n">'+n+'</div><div class="t">'+t+'</div></div>'; }

  // ── CLIENTES ──
  var clState={ q:'', estado:'', empresa:'', barrio:'', pend:false, page:0, size:50, total:0 };
  function vClientes(){
    view.innerHTML =
      '<h1>Clientes</h1><p class="sub">Base completa de Nexa.</p>'
      +'<div class="toolbar">'
      +'<input id="cl-q" placeholder="Buscar nombre, N° cliente o DNI…" value="'+esc(clState.q)+'" style="min-width:240px">'
      +'<select id="cl-estado"><option value="">Todos los estados</option>'+opt(['activo','bloqueado','baja','suspendido','moroso','prospecto'],clState.estado)+'</select>'
      +'<select id="cl-empresa"><option value="">Todas las empresas</option>'+opt(REF.empresas.map(function(e){return e.nombre;}),clState.empresa)+'</select>'
      +'<select id="cl-barrio"><option value="">Todos los barrios</option>'+opt(REF.barrios.map(function(b){return b.nombre;}),clState.barrio)+'</select>'
      +'<button class="btn btn-pri" id="cl-buscar">Buscar</button>'
      +'<button class="btn '+(clState.pend?'btn-x':'btn-2')+'" id="cl-pend" title="Solo clientes que faltan cargar en ISPcube">⚠️ Falta en ISPcube'+(clState.pend?' ✓':'')+'</button>'
      +'</div><div id="cl-tabla"></div>';
    document.getElementById('cl-buscar').addEventListener('click',function(){ leerFiltrosCl(); clState.page=0; cargarClientes(); });
    document.getElementById('cl-q').addEventListener('keydown',function(e){ if(e.key==='Enter'){ leerFiltrosCl(); clState.page=0; cargarClientes(); } });
    document.getElementById('cl-pend').addEventListener('click',function(){ leerFiltrosCl(); clState.pend=!clState.pend; clState.page=0; vClientes(); });
    cargarClientes();
  }
  function leerFiltrosCl(){
    clState.q=document.getElementById('cl-q').value.trim();
    clState.estado=document.getElementById('cl-estado').value;
    clState.empresa=document.getElementById('cl-empresa').value;
    clState.barrio=document.getElementById('cl-barrio').value;
  }
  function clQuery(){
    var p=['select=id,numero_cliente,nombre,apellido,doc_numero,telefono,estado,empresa,barrio,codigo_ispcube,planes(nombre)','order=numero_cliente.desc'];
    if(clState.estado) p.push('estado=eq.'+clState.estado);
    if(clState.empresa) p.push('empresa=eq.'+encodeURIComponent(clState.empresa));
    if(clState.barrio) p.push('barrio=eq.'+encodeURIComponent(clState.barrio));
    if(clState.pend) p.push('codigo_ispcube=is.null');
    if(clState.q){
      var q=clState.q.replace(/[(),]/g,' ').trim();
      var ors=['nombre.ilike.*'+q+'*','doc_numero.ilike.*'+q+'*'];
      if(/^\d+$/.test(q)) ors.push('numero_cliente.eq.'+q);
      p.push('or=('+ors.join(',')+')');
    }
    return p.join('&');
  }
  function cargarClientes(){
    var cont=document.getElementById('cl-tabla'); cont.innerHTML='<div class="center"><div class="spin"></div></div>';
    var base=clQuery();
    sbCount('clientes?'+base.replace(/select=[^&]*/,'select=id')).then(function(tot){ clState.total=tot; });
    fetch(SB_URL+'/rest/v1/clientes?'+base,{headers:Object.assign({},H,{'Range':(clState.page*clState.size)+'-'+((clState.page+1)*clState.size-1)})})
     .then(function(r){return r.json();}).then(function(d){
      if(!Array.isArray(d)||!d.length){ cont.innerHTML='<div class="center">Sin resultados.</div>'; return; }
      var h='<table><thead><tr><th>N°</th><th>Nombre</th><th>DNI</th><th>Teléfono</th><th>Plan</th><th>Barrio</th><th>Empresa</th><th>Estado</th></tr></thead><tbody>';
      d.forEach(function(c){
        var isp = c.codigo_ispcube ? '' : ' <span class="pill p-bloqueado" title="Falta cargar en ISPcube">⚠️ ISP</span>';
        h+='<tr data-id="'+c.id+'"><td><b>'+esc(c.numero_cliente)+'</b></td><td>'+esc(c.nombre||'')+' '+esc(c.apellido||'')+'</td><td>'+esc(c.doc_numero||'')+'</td><td>'+esc(c.telefono||'')+'</td><td>'+esc(c.planes?c.planes.nombre:'')+'</td><td>'+esc(c.barrio||'')+'</td><td><span class="empresa-tag">'+esc(c.empresa||'')+'</span></td><td>'+pill(c.estado)+isp+'</td></tr>';
      });
      h+='</tbody></table>';
      var pages=Math.ceil(clState.total/clState.size)||1;
      h+='<div class="pag"><button class="btn btn-2" id="cl-prev" '+(clState.page<=0?'disabled':'')+'>‹ Anterior</button>'
        +'<span class="muted">Página '+(clState.page+1)+' de '+pages+' · '+clState.total+' clientes</span>'
        +'<button class="btn btn-2" id="cl-next" '+(clState.page>=pages-1?'disabled':'')+'>Siguiente ›</button></div>';
      cont.innerHTML=h;
      Array.prototype.forEach.call(cont.querySelectorAll('tr[data-id]'),function(tr){ tr.addEventListener('click',function(){ fichaCliente(tr.getAttribute('data-id')); }); });
      var pv=document.getElementById('cl-prev'), nx=document.getElementById('cl-next');
      if(pv) pv.addEventListener('click',function(){ if(clState.page>0){clState.page--; cargarClientes();} });
      if(nx) nx.addEventListener('click',function(){ clState.page++; cargarClientes(); });
    });
  }

  // Ficha editable de una solicitud (corroborar/modificar antes de convertir)
  function fichaSolicitud(s){
    function inp(id,val,ph){ return '<input id="fs-'+id+'" placeholder="'+esc(ph||'')+'" value="'+esc(val||'')+'">'; }
    function selFrom(id,names,cur){ var a=names.slice(); if(cur&&a.indexOf(cur)===-1) a.unshift(cur); return '<select id="fs-'+id+'"><option value="">—</option>'+a.map(function(n){return '<option'+(n===cur?' selected':'')+'>'+esc(n)+'</option>';}).join('')+'</select>'; }
    var planOpts='<option value="">— sin asignar —</option>'+REF.planes.map(function(p){return '<option value="'+p.id+'"'+(s.plan_id==p.id?' selected':'')+'>'+esc(p.nombre)+'</option>';}).join('');
    function ubicHtml(){
      var cur=(s.lat&&s.lng)
        ? '<div style="font-size:13px;margin-bottom:6px">📍 <a href="https://www.google.com/maps?q='+esc(s.lat)+','+esc(s.lng)+'" target="_blank">Ver en el mapa</a> <span class="muted">('+esc((+s.lat).toFixed(5))+', '+esc((+s.lng).toFixed(5))+')</span></div>'
        : '<div style="font-size:13px;color:var(--rojo);margin-bottom:6px">Sin ubicación GPS — pegá la que mande por WhatsApp 👇</div>';
      return cur+'<div style="display:flex;gap:8px"><input id="fs-ubic-in" placeholder="Link de Maps/WhatsApp o lat, lng"><button class="btn btn-2" id="fs-ubic-save" type="button">Guardar ubic.</button></div>';
    }
    function parseLL(t){ var m=String(t||'').match(/-?\d{1,3}\.\d+\s*,\s*-?\d{1,3}\.\d+/); if(!m) return null; var p=m[0].split(/\s*,\s*/); var la=parseFloat(p[0]), ln=parseFloat(p[1]); if(la<-90||la>90||ln<-180||ln>180) return null; return { lat:la, lng:ln }; }
    function wireUbic(){
      var b=document.getElementById('fs-ubic-save'); if(!b) return;
      b.addEventListener('click',function(){
        var ll=parseLL(document.getElementById('fs-ubic-in').value);
        if(!ll){ toast('No pude leer la ubicación. Pegá un link de Maps o "lat, lng".'); return; }
        sbPatch('solicitudes_alta?id=eq.'+s.id,{ lat:ll.lat, lng:ll.lng }).then(function(){ s.lat=ll.lat; s.lng=ll.lng; var c=document.getElementById('fs-ubic'); if(c){ c.innerHTML=ubicHtml(); wireUbic(); } toast('Ubicación guardada ✓'); });
      });
    }
    var aviso=s.ya_es_cliente?'<div style="background:#fef3c7;border:1px solid #fde68a;border-radius:8px;padding:8px;margin-top:8px;font-size:13px">⚠️ El solicitante dice que YA es cliente'+(s.numero_cliente_existente?(' (N° '+esc(s.numero_cliente_existente)+')'):'')+'. Verificá antes de crear uno nuevo.</div>':'';
    var h='<h2>Solicitud de '+esc(s.nombre||'')+' '+esc(s.apellido||'')+'</h2>'
      +'<p class="muted">'+esc((s.created_at||'').substring(0,16).replace('T',' '))+' · origen: '+esc(s.origen||'—')+(s.plan_texto?(' · pidió: '+esc(s.plan_texto)):'')+'</p>'+aviso
      +'<div class="row"><div><label class="l">Nombre</label>'+inp('nombre',s.nombre)+'</div><div><label class="l">Apellido</label>'+inp('apellido',s.apellido)+'</div></div>'
      +'<div class="row"><div><label class="l">DNI</label>'+inp('doc_numero',s.doc_numero)+'</div><div><label class="l">Teléfono</label>'+inp('telefono',s.telefono)+'</div></div>'
      +'<div class="row"><div><label class="l">Tel. alternativo</label>'+inp('telefono_alt',s.telefono_alt)+'</div><div><label class="l">Email</label>'+inp('email',s.email)+'</div></div>'
      +'<div class="row"><div style="flex:3"><label class="l">Calle</label>'+inp('calle',s.calle)+'</div><div><label class="l">N°</label>'+inp('numero',s.numero)+'</div></div>'
      +'<div class="row"><div><label class="l">Piso/Lote</label>'+inp('piso',s.piso)+'</div><div><label class="l">Depto/Casa</label>'+inp('depto',s.depto)+'</div></div>'
      +'<div class="row"><div><label class="l">Barrio</label>'+selFrom('barrio',REF.barrios.map(function(b){return b.nombre;}),s.barrio)+'</div><div><label class="l">Empresa</label>'+selFrom('empresa',REF.empresas.map(function(e){return e.nombre;}),s.empresa)+'</div></div>'
      +'<label class="l">Plan</label><select id="fs-plan">'+planOpts+'</select>'
      +'<div style="display:flex;gap:16px;margin-top:10px"><label style="font-weight:600"><input type="checkbox" id="fs-tv"'+(s.tv_online?' checked':'')+'> TV Online</label><label style="font-weight:600"><input type="checkbox" id="fs-fut"'+(s.pack_futbol?' checked':'')+'> Pack Fútbol</label></div>'
      +'<label class="l">Observaciones</label><textarea id="fs-obs">'+esc(s.observaciones||'')+'</textarea>'
      +'<label class="l">Ubicación GPS</label><div id="fs-ubic">'+ubicHtml()+'</div>'
      +'<div id="fs-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
      +'<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap"><button class="btn btn-ok" id="fs-conv">✓ Convertir a cliente + OT</button><button class="btn btn-pri" id="fs-save">💾 Guardar cambios</button><button class="btn btn-x" id="fs-rej">✗ Rechazar</button><button class="btn btn-2" id="fs-close">Cerrar</button></div>';
    modal(h);
    wireUbic();
    function leer(){
      function v(id){ var e=document.getElementById('fs-'+id); return e?(e.type==='checkbox'?e.checked:e.value.trim()):''; }
      var o={ nombre:v('nombre'),apellido:v('apellido'),doc_numero:v('doc_numero')||null,telefono:v('telefono'),telefono_alt:v('telefono_alt')||null,
        email:v('email')||null,calle:v('calle'),numero:v('numero'),piso:v('piso')||null,depto:v('depto')||null,
        barrio:v('barrio')||null,empresa:v('empresa')||null,observaciones:v('obs')||null,tv_online:v('tv'),pack_futbol:v('fut') };
      var pid=document.getElementById('fs-plan').value; o.plan_id=pid?Number(pid):null;
      o.domicilio_full=[o.calle,o.numero,o.piso?('Piso/Lote '+o.piso):'',o.depto?('Casa/Depto '+o.depto):'',o.barrio].filter(Boolean).join(' ');
      return o;
    }
    document.getElementById('fs-close').addEventListener('click',cerrarModal);
    document.getElementById('fs-save').addEventListener('click',function(){
      var btn=this; btn.disabled=true; var o=leer();
      sbPatch('solicitudes_alta?id=eq.'+s.id,o).then(function(){ Object.assign(s,o); btn.disabled=false; toast('Cambios guardados ✓'); })
        .catch(function(){ btn.disabled=false; document.getElementById('fs-err').textContent='No se pudo guardar.'; });
    });
    document.getElementById('fs-rej').addEventListener('click',function(){
      if(!confirm('¿Rechazar esta solicitud?')) return;
      var motivo=prompt('Motivo del rechazo (opcional):');
      sbPatch('solicitudes_alta?id=eq.'+s.id,{ estado:'rechazada', observaciones:(motivo||s.observaciones||null), gestionado_por:USER.id, gestionado_at:new Date().toISOString() })
        .then(function(){ cerrarModal(); toast('Solicitud rechazada'); vSolicitudes(); });
    });
    document.getElementById('fs-conv').addEventListener('click',function(){
      var err=document.getElementById('fs-err'); var o=leer();
      if(!o.nombre||!o.telefono){ err.textContent='Nombre y teléfono son obligatorios.'; return; }
      var btn=this; btn.disabled=true; btn.textContent='Creando…';
      sbPatch('solicitudes_alta?id=eq.'+s.id,o).then(function(){
        var cli={ nombre:o.nombre,apellido:o.apellido,tipo_doc:'DNI',doc_numero:o.doc_numero,telefono:o.telefono,telefono_alt:o.telefono_alt,
          email:o.email,calle:o.calle,numero:o.numero,piso:o.piso,depto:o.depto,barrio:o.barrio,domicilio_full:o.domicilio_full,
          lat:s.lat,lng:s.lng,empresa:o.empresa,plan_id:o.plan_id,tv_online:o.tv_online,pack_futbol:o.pack_futbol,
          estado:'prospecto',fecha_alta:new Date().toISOString().substring(0,10) };
        return sbPost('clientes',cli);
      }).then(function(r){
        var c=r[0]; if(!c) throw 0;
        return sbPost('ordenes_trabajo',{ cliente_id:c.id,solicitud_id:s.id,tipo:'INSTALACION',estado:'PENDIENTE',prioridad:'NORMAL',plan_id:o.plan_id,descripcion:'Instalación nueva (desde solicitud web)',created_by:USER.id })
          .then(function(){ return sbPatch('solicitudes_alta?id=eq.'+s.id,{ estado:'convertida',cliente_id:c.id,gestionado_por:USER.id,gestionado_at:new Date().toISOString() }); })
          .then(function(){ return c; });
      }).then(function(c){ cerrarModal(); toast('Cliente N° '+c.numero_cliente+' y OT creados ✓'); vSolicitudes(); })
      .catch(function(){ err.textContent='No se pudo completar. Revisá los datos.'; btn.disabled=false; btn.textContent='✓ Convertir a cliente + OT'; });
    });
  }

  function cargarOT(){
    var cont=document.getElementById('ot-tabla'); cont.innerHTML='<div class="center"><div class="spin"></div></div>';
    var base='select=id,numero,tipo,estado,prioridad,fecha_agendada,created_at,clientes(numero_cliente,nombre,apellido,barrio),cuadrillas(nombre)&order=created_at.desc';
    if(otState.estado) base+='&estado=eq.'+otState.estado;
    if(otState.tipo) base+='&tipo=eq.'+otState.tipo;
    sbCount('ordenes_trabajo?select=id'+(otState.estado?'&estado=eq.'+otState.estado:'')+(otState.tipo?'&tipo=eq.'+otState.tipo:'')).then(function(t){ otState.total=t; });
    fetch(SB_URL+'/rest/v1/ordenes_trabajo?'+base,{headers:Object.assign({},H,{'Range':(otState.page*otState.size)+'-'+((otState.page+1)*otState.size-1)})})
     .then(function(r){return r.json();}).then(function(d){
      if(!Array.isArray(d)||!d.length){ cont.innerHTML='<div class="center">No hay órdenes'+(otState.estado?' en ese estado':'')+'.</div>'; return; }
      var h='<table><thead><tr><th>N° OT</th><th>Tipo</th><th>Cliente</th><th>Barrio</th><th>Cuadrilla</th><th>Agendada</th><th>Estado</th></tr></thead><tbody>';
      d.forEach(function(o){
        var cli=o.clientes?('N°'+o.clientes.numero_cliente+' · '+(o.clientes.nombre||'')+' '+(o.clientes.apellido||'')):'—';
        h+='<tr data-id="'+o.id+'"><td><b>'+esc(o.numero)+'</b></td><td>'+esc(o.tipo)+'</td><td>'+esc(cli)+'</td><td>'+esc(o.clientes?o.clientes.barrio||'':'')+'</td><td>'+esc(o.cuadrillas?o.cuadrillas.nombre:'—')+'</td><td>'+esc(o.fecha_agendada||'—')+'</td><td>'+pill(o.estado)+'</td></tr>';
      });
      h+='</tbody></table>';
      var pages=Math.ceil(otState.total/otState.size)||1;
      h+='<div class="pag"><button class="btn btn-2" id="ot-prev" '+(otState.page<=0?'disabled':'')+'>‹</button><span class="muted">Página '+(otState.page+1)+' de '+pages+' · '+otState.total+' OT</span><button class="btn btn-2" id="ot-next" '+(otState.page>=pages-1?'disabled':'')+'>›</button></div>';
      cont.innerHTML=h;
      Array.prototype.forEach.call(cont.querySelectorAll('tr[data-id]'),function(tr){ tr.addEventListener('click',function(){ detalleOT(tr.getAttribute('data-id')); }); });
      var pv=document.getElementById('ot-prev'),nx=document.getElementById('ot-next');
      if(pv)pv.addEventListener('click',function(){ if(otState.page>0){otState.page--;cargarOT();} });
      if(nx)nx.addEventListener('click',function(){ otState.page++; cargarOT(); });
    });
  }
  function nuevaOT(cliente){
    var buscar = cliente ? '<div class="ficha-row"><span class="k">Cliente</span><span class="v">N°'+esc(cliente.numero_cliente)+' · '+esc(cliente.nombre||'')+' '+esc(cliente.apellido||'')+'</span></div>'
      : '<label class="l">Buscar cliente <span class="muted" style="text-transform:none;font-weight:400">(opcional — dejalo vacío para obra de red)</span></label><input id="ot-cli-q" placeholder="N° o nombre, y Enter"><div id="ot-cli-res"></div><div id="ot-cli-sel" class="muted" style="margin-top:6px"></div>';
    var selId = cliente ? cliente.id : null;
    function autoTrab(tec){ var cod=/ftth/i.test(tec||'')?'FTTH':(/(inalamb|wireless|wifi)/i.test(tec||'')?'WIRELESS':null); if(!cod) return; var f=REF.tiposTrab.filter(function(t){return t.codigo===cod;})[0]; var sel=document.getElementById('ot-trab'); if(f&&sel&&!sel.value) sel.value=f.id; }
    modal('<h2>Nueva orden de trabajo</h2>'+buscar
      +'<label class="l">Tipo de trabajo</label><select id="ot-trab">'+trabOpts('')+'</select>'

      +'<label class="l">Motivo (para service / reparación)</label><select id="ot-motivo"><option value="">— sin motivo —</option>'+REF.motivos.map(function(m){return '<option value="'+m.id+'">'+esc(m.nombre)+'</option>';}).join('')+'</select>'
      +'<label class="l">Prioridad</label><select id="ot-prio">'+opt(['BAJA','NORMAL','ALTA','URGENTE'],'NORMAL')+'</select>'
      +'<label class="l">Fecha agendada (opcional)</label><input id="ot-fecha" type="date">'
      +'<label class="l">Descripción</label><textarea id="ot-desc" placeholder="Detalle del trabajo"></textarea>'
      +'<div id="ot-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
      +'<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ok" id="ot-go">Crear OT</button><button class="btn btn-2" id="ot-cancel">Cancelar</button></div>');
    document.getElementById('ot-cancel').addEventListener('click',cerrarModal);
    if(cliente) autoTrab(cliente.tecnologia);
    if(!cliente){
      var qi=document.getElementById('ot-cli-q');
      qi.addEventListener('keydown',function(e){ if(e.key!=='Enter')return; var q=qi.value.trim().replace(/[(),]/g,' ');
        var ors=/^\d+$/.test(q)?('numero_cliente.eq.'+q+',nombre.ilike.*'+q+'*'):'nombre.ilike.*'+q+'*';
        sbGet('clientes?or=('+ors+')&select=id,numero_cliente,nombre,apellido,tecnologia&limit=8').then(function(rs){
          document.getElementById('ot-cli-res').innerHTML=rs.map(function(c){return '<div style="padding:6px;border:1px solid var(--bord);border-radius:8px;margin-top:4px;cursor:pointer" data-cid="'+c.id+'" data-tec="'+esc(c.tecnologia||'')+'">N°'+esc(c.numero_cliente)+' · '+esc(c.nombre||'')+' '+esc(c.apellido||'')+'</div>';}).join('');
          Array.prototype.forEach.call(document.getElementById('ot-cli-res').querySelectorAll('[data-cid]'),function(el){ el.addEventListener('click',function(){ selId=el.getAttribute('data-cid'); document.getElementById('ot-cli-sel').innerHTML='✓ '+el.textContent.trim(); document.getElementById('ot-cli-res').innerHTML=''; autoTrab(el.getAttribute('data-tec')); }); });
        });
      });
    }
    document.getElementById('ot-go').addEventListener('click',function(){
      var trab=document.getElementById('ot-trab').value;
      if(!selId && !trab){ document.getElementById('ot-err').textContent='Elegí un cliente o un tipo de trabajo.'; return; }
      var btn=document.getElementById('ot-go'); btn.disabled=true; btn.textContent='Creando…';
      var mtv=document.getElementById('ot-motivo').value;
      sbPost('ordenes_trabajo',{ cliente_id:(selId?Number(selId):null), tipo_trabajo_id:(trab?Number(trab):null), tipo:document.getElementById('ot-tipo').value, prioridad:document.getElementById('ot-prio').value,
        motivo_id:(mtv?Number(mtv):null), estado:'PENDIENTE', fecha_agendada:document.getElementById('ot-fecha').value||null, descripcion:document.getElementById('ot-desc').value||null, created_by:USER.id })
        .then(function(r){ if(!r[0])throw 0; cerrarModal(); toast('OT N° '+r[0].numero+' creada ✓'); if(typeof cargarOT==='function'&&document.getElementById('ot-tabla'))cargarOT(); })
        .catch(function(){ document.getElementById('ot-err').textContent='No se pudo crear.'; btn.disabled=false; btn.textContent='Crear OT'; });
    });
  }
  function detalleOT(id){
    sbGet('ordenes_trabajo?id=eq.'+id+'&select=*,clientes(numero_cliente,nombre,apellido,telefono,domicilio_full,barrio,caja_nap,puerto,precinto),cuadrillas(nombre),motivos_ot(nombre)&limit=1').then(function(d){
      var o=d[0]; if(!o)return;
      function fr(k,v){ return '<div class="ficha-row"><span class="k">'+k+'</span><span class="v">'+esc(v||'—')+'</span></div>'; }
      var cuadOpts='<option value="">— sin asignar —</option>'+REF.cuadrillas.map(function(c){return '<option value="'+c.id+'"'+(o.cuadrilla_id==c.id?' selected':'')+'>'+esc(c.nombre)+'</option>';}).join('');
      var cli=o.clientes?('N°'+o.clientes.numero_cliente+' · '+(o.clientes.nombre||'')+' '+(o.clientes.apellido||'')):'—';
      modal('<h2>OT N° '+esc(o.numero)+' · '+esc(o.tipo)+'</h2><p class="muted">'+pill(o.estado)+' · prioridad '+esc(o.prioridad)+'</p>'
        +fr('Cliente',cli)+fr('Teléfono',o.clientes?o.clientes.telefono:'')+fr('Domicilio',o.clientes?o.clientes.domicilio_full:'')+fr('Barrio',o.clientes?o.clientes.barrio:'')
        +(o.clientes?fr('Conexión','Caja '+(o.clientes.caja_nap||'—')+' · Puerto '+(o.clientes.puerto||'—')+' · Precinto '+(o.clientes.precinto||'—')):'')
        +(o.motivos_ot?fr('Motivo',o.motivos_ot.nombre):'')+fr('Descripción',o.descripcion)+fr('Agendada',o.fecha_agendada)
        +'<label class="l">Tipo de trabajo</label><select id="ot-trab-edit">'+trabOpts(o.tipo_trabajo_id)+'</select>'
        +'<div class="row"><div><label class="l">Tipo de OT</label><select id="ot-tipo-edit">'+opt(OT_TIPOS,o.tipo)+'</select></div><div><label class="l">Prioridad</label><select id="ot-prio-edit">'+opt(['BAJA','NORMAL','ALTA','URGENTE'],o.prioridad)+'</select></div></div>'
        +'<label class="l">Asignar a cuadrilla</label><select id="ot-cuad">'+cuadOpts+'</select>'
        +'<label class="l">Cambiar estado</label><select id="ot-est">'+opt(['PENDIENTE','ASIGNADA','EN_CURSO','CERRADA_TECNICO','FINALIZADA','CANCELADA','NO_REALIZADA'],o.estado)+'</select>'
        +'<div style="display:flex;gap:8px;margin-top:14px;flex-wrap:wrap"><button class="btn btn-pri" id="ot-save">Guardar</button><button class="btn btn-ok" id="ot-print">🖨️ Imprimir OT</button><button class="btn btn-2" id="ot-x">Cerrar</button><button class="btn btn-x" id="ot-del" style="margin-left:auto">🗑️ Eliminar</button></div>');
      document.getElementById('ot-x').addEventListener('click',cerrarModal);
      document.getElementById('ot-print').addEventListener('click',function(){ imprimirOT(id); });
      document.getElementById('ot-save').addEventListener('click',function(){
        var cuad=document.getElementById('ot-cuad').value, est=document.getElementById('ot-est').value, trab=document.getElementById('ot-trab-edit').value;
        var upd={ estado:est, cuadrilla_id:cuad?Number(cuad):null, tipo:document.getElementById('ot-tipo-edit').value, prioridad:document.getElementById('ot-prio-edit').value, tipo_trabajo_id:(trab?Number(trab):null) };
        if(est==='ASIGNADA'&&cuad&&!o.asignada_at) upd.asignada_at=new Date().toISOString();
        sbPatch('ordenes_trabajo?id=eq.'+id,upd).then(function(){ cerrarModal(); toast('OT actualizada ✓'); cargarOT(); });
      });
      document.getElementById('ot-del').addEventListener('click',function(){
        if(!confirm('¿Eliminar la OT N° '+o.numero+'? Esta acción no se puede deshacer.')) return;
        fetch(SB_URL+'/rest/v1/ordenes_trabajo?id=eq.'+id,{method:'DELETE',headers:H}).then(function(r){
          if(r.ok){ cerrarModal(); toast('OT eliminada'); cargarOT(); }
          else { toast('No se pudo eliminar (¿tiene movimientos asociados?).'); }
        }).catch(function(){ toast('No se pudo eliminar.'); });
      });
    });
  }

  // ── TIPOS DE TRABAJO ── (FTTH, Wireless, Tendido, Fusiones… c/u con materiales + mano de obra + cuadrillas)
  var OT_TIPOS=['INSTALACION','REPARACION','DESCONEXION','RECONEXION','CAMBIO_PLAN','CAMBIO_DOMICILIO','MANTENIMIENTO','RETIRO_EQUIPOS','OTRO'];
  var ttState={ tab:'trabajos' };
  function _slug(s){ return String(s||'').toUpperCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9]+/g,'_').replace(/^_+|_+$/g,''); }
  function trabOpts(sel){ return '<option value="">— elegí —</option>'+REF.tiposTrab.map(function(t){return '<option value="'+t.id+'"'+(t.id==sel?' selected':'')+'>'+esc(t.nombre)+'</option>';}).join(''); }
  function reloadTrab(){ return sbGet('tipos_trabajo?select=*&activo=eq.true&order=orden').then(function(d){ REF.tiposTrab=Array.isArray(d)?d:[]; }); }
  function vTiposTrabajo(){
    view.innerHTML='<h1>Tipos de trabajo</h1><p class="sub">FTTH, Wireless, Tendido de red, Fusiones… Cada tipo con sus materiales, su mano de obra y las cuadrillas que lo hacen.</p>'
      +'<div class="toolbar" id="mo-tabs">'
      +'<button class="btn '+(ttState.tab==='trabajos'?'btn-pri':'btn-2')+'" data-tab="trabajos">🧰 Tipos de trabajo</button>'
      +'<button class="btn '+(ttState.tab==='catalogo'?'btn-pri':'btn-2')+'" data-tab="catalogo">🛠️ Catálogo de mano de obra</button>'
      +'</div><div id="mo-cont"></div>';
    Array.prototype.forEach.call(document.querySelectorAll('#mo-tabs [data-tab]'),function(b){ b.addEventListener('click',function(){ ttState.tab=b.getAttribute('data-tab'); vTiposTrabajo(); }); });
    if(ttState.tab==='catalogo') moCatalogo(); else ttList();
  }
  function ttList(){
    var cont=document.getElementById('mo-cont'); cont.innerHTML='<div class="center"><div class="spin"></div></div>';
    Promise.all([ sbGet('tipos_trabajo?select=*&order=orden'), sbGet('tipo_trabajo_material?select=tipo_trabajo_id'), sbGet('tipo_trabajo_mano_obra?select=tipo_trabajo_id') ]).then(function(r){
      var tt=Array.isArray(r[0])?r[0]:[], cm={}, co={};
      (r[1]||[]).forEach(function(x){ cm[x.tipo_trabajo_id]=(cm[x.tipo_trabajo_id]||0)+1; });
      (r[2]||[]).forEach(function(x){ co[x.tipo_trabajo_id]=(co[x.tipo_trabajo_id]||0)+1; });
      var h='<div class="toolbar"><button class="btn btn-ok" id="tt-nuevo">+ Nuevo tipo de trabajo</button><span class="muted">'+tt.length+' tipos</span></div>';
      h+='<table><thead><tr><th>Tipo de trabajo</th><th>Materiales</th><th>Mano de obra</th><th>Estado</th></tr></thead><tbody>';
      tt.forEach(function(t){ h+='<tr data-id="'+t.id+'" style="cursor:pointer"><td><b>'+esc(t.nombre)+'</b></td><td><b>'+(cm[t.id]||0)+'</b></td><td><b>'+(co[t.id]||0)+'</b></td><td>'+(t.activo?'<span class="pill p-activo">activo</span>':'<span class="pill p-baja">inactivo</span>')+'</td></tr>'; });
      h+='</tbody></table>'; cont.innerHTML=h;
      document.getElementById('tt-nuevo').addEventListener('click',function(){ formTrab(null); });
      Array.prototype.forEach.call(cont.querySelectorAll('tr[data-id]'),function(tr){ tr.addEventListener('click',function(){ formTrab(tt.filter(function(x){return x.id==tr.getAttribute('data-id');})[0]); }); });
    });
  }
  function formTrab(t){
    t=t||{};
    Promise.all([
      sbGet('catalogo_materiales?select=id,nombre&activo=eq.true&order=orden'),
      sbGet('mano_obra_catalogo?select=id,nombre&activo=eq.true&order=orden'),
      t.id?sbGet('tipo_trabajo_material?tipo_trabajo_id=eq.'+t.id+'&select=material_id,catalogo_materiales(nombre)&order=orden'):Promise.resolve([]),
      t.id?sbGet('tipo_trabajo_mano_obra?tipo_trabajo_id=eq.'+t.id+'&select=mano_obra_id,mano_obra_catalogo(nombre)&order=orden'):Promise.resolve([]),
      t.id?sbGet('cuadrilla_tipos_trabajo?tipo_trabajo_id=eq.'+t.id+'&select=cuadrilla_id'):Promise.resolve([])
    ]).then(function(r){
      var allMat=r[0]||[], allMo=r[1]||[], aCu=(r[4]||[]).map(function(x){return x.cuadrilla_id;});
      var asgMat=(r[2]||[]).map(function(x){return {id:x.material_id,nombre:(x.catalogo_materiales||{}).nombre||''};});
      var asgMo=(r[3]||[]).map(function(x){return {id:x.mano_obra_id,nombre:(x.mano_obra_catalogo||{}).nombre||''};});
      function avail(all,asg){ return all.filter(function(m){ return !asg.some(function(a){return a.id===m.id;}); }).map(function(m){return {id:m.id,nombre:m.nombre};}); }
      var avMat=avail(allMat,asgMat), avMo=avail(allMo,asgMo);
      var cuaChecks=REF.cuadrillas.length?REF.cuadrillas.map(function(c){ return '<label style="display:inline-block;margin-right:14px;font-weight:500"><input type="checkbox" class="tt-cu" value="'+c.id+'"'+(aCu.indexOf(c.id)>=0?' checked':'')+'> '+esc(c.nombre)+'</label>'; }).join(''):'<span class="muted">No hay cuadrillas.</span>';
      function colHtml(kind,titulo){ return '<div><label class="l">'+titulo+' <span class="muted" style="text-transform:none;font-weight:400">(↑↓ ordená)</span></label>'
        +'<div id="tt-'+kind+'-asg" style="min-height:60px;max-height:220px;overflow:auto;border:1px solid var(--bord);border-radius:8px;padding:6px"></div>'
        +'<div class="muted" style="font-size:11px;margin:6px 0 2px">Agregar:</div><div id="tt-'+kind+'-av" style="max-height:130px;overflow:auto;border:1px dashed var(--bord);border-radius:8px;padding:6px"></div></div>'; }
      modal('<h2>'+(t.id?'Editar':'Nuevo')+' tipo de trabajo</h2>'
        +'<div class="row"><div style="flex:2"><label class="l">Nombre</label><input id="tt-nombre" value="'+esc(t.nombre||'')+'" placeholder="Ej: Tendido de red"></div><div><label class="l">Orden</label><input id="tt-orden" type="number" value="'+esc(t.orden||100)+'"></div></div>'
        +'<div style="margin-top:8px"><label style="font-weight:600"><input type="checkbox" id="tt-activo"'+(t.activo!==false?' checked':'')+'> Activo</label></div>'
        +'<div class="row" style="margin-top:6px">'+colHtml('mat','Materiales de este tipo')+colHtml('mo','Mano de obra de este tipo')+'</div>'
        +'<div style="display:flex;gap:6px;margin-top:6px"><input id="tt-mo-nueva" placeholder="Crear mano de obra nueva y agregarla" style="flex:1"><button class="btn btn-2" id="tt-mo-add" type="button">+ Crear</button></div>'
        +'<div style="display:flex;align-items:center;gap:10px;margin-top:8px"><label class="l" style="margin:0">Cuadrillas que hacen este trabajo</label><button class="btn btn-2" id="tt-cu-all" type="button" style="padding:3px 10px;font-size:12px">✓ Todas / ninguna</button></div><div style="border:1px solid var(--bord);border-radius:8px;padding:8px;margin-top:4px">'+cuaChecks+'</div>'
        +'<div id="tt-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
        +'<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ok" id="tt-save">Guardar</button><button class="btn btn-2" id="tt-x">Cancelar</button></div>','wide');
      var _drag={kind:null,idx:-1};
      function renderOrd(kind){
        var asg= kind==='mat'?asgMat:asgMo, av= kind==='mat'?avMat:avMo;
        var tint= kind==='mat'?['#eff6ff','#dbeafe','#1e40af']:['#f0fdf4','#dcfce7','#166534'];
        var ae=document.getElementById('tt-'+kind+'-asg'), ve=document.getElementById('tt-'+kind+'-av');
        ae.innerHTML= asg.length? asg.map(function(m,i){ return '<div class="ord-row" draggable="true" data-i="'+i+'" style="display:flex;align-items:center;gap:6px;padding:5px 6px;margin-bottom:3px;border:1px solid '+tint[1]+';border-radius:6px;background:'+(i%2?tint[0]:tint[1])+';cursor:grab">'
          +'<span style="display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;background:'+tint[2]+';color:#fff;font-size:11px;font-weight:700;flex:none">'+(i+1)+'</span>'
          +'<span style="flex:1;font-weight:700;font-size:13px;color:'+tint[2]+'">'+esc(m.nombre)+'</span>'
          +'<button class="btn btn-2 o-up" data-i="'+i+'" style="padding:1px 7px"'+(i===0?' disabled':'')+'>↑</button><button class="btn btn-2 o-dn" data-i="'+i+'" style="padding:1px 7px"'+(i===asg.length-1?' disabled':'')+'>↓</button><button class="btn btn-x o-rm" data-i="'+i+'" style="padding:1px 7px">✕</button></div>'; }).join(''):'<span class="muted">sin asignar</span>';
        ve.innerHTML= av.length? av.map(function(m){ return '<div class="o-add" data-id="'+m.id+'" style="cursor:pointer;padding:3px 8px;margin-bottom:2px;border-radius:5px;background:#f8fafc;color:var(--pri);font-weight:600;font-size:12px">+ '+esc(m.nombre)+'</div>'; }).join(''):'<span class="muted">— todo agregado —</span>';
        Array.prototype.forEach.call(ae.querySelectorAll('.o-up'),function(b){ b.addEventListener('click',function(e){ e.stopPropagation(); var i=+b.getAttribute('data-i'),x=asg[i-1]; asg[i-1]=asg[i]; asg[i]=x; renderOrd(kind); }); });
        Array.prototype.forEach.call(ae.querySelectorAll('.o-dn'),function(b){ b.addEventListener('click',function(e){ e.stopPropagation(); var i=+b.getAttribute('data-i'),x=asg[i+1]; asg[i+1]=asg[i]; asg[i]=x; renderOrd(kind); }); });
        Array.prototype.forEach.call(ae.querySelectorAll('.o-rm'),function(b){ b.addEventListener('click',function(e){ e.stopPropagation(); var i=+b.getAttribute('data-i'); av.push(asg[i]); asg.splice(i,1); renderOrd(kind); }); });
        Array.prototype.forEach.call(ve.querySelectorAll('.o-add'),function(b){ b.addEventListener('click',function(){ var id=+b.getAttribute('data-id'),idx=-1; for(var k=0;k<av.length;k++){if(av[k].id===id){idx=k;break;}} if(idx>=0){ asg.push(av[idx]); av.splice(idx,1); renderOrd(kind); } }); });
        Array.prototype.forEach.call(ae.querySelectorAll('.ord-row'),function(row){
          row.addEventListener('dragstart',function(){ _drag.kind=kind; _drag.idx=+row.getAttribute('data-i'); row.style.opacity='.4'; });
          row.addEventListener('dragend',function(){ row.style.opacity=''; });
          row.addEventListener('dragover',function(e){ e.preventDefault(); });
          row.addEventListener('drop',function(e){ e.preventDefault(); if(_drag.kind!==kind||_drag.idx<0) return; var to=+row.getAttribute('data-i'), from=_drag.idx; if(from===to){ _drag.idx=-1; return; } var it=asg.splice(from,1)[0]; asg.splice(to,0,it); _drag.idx=-1; renderOrd(kind); });
        });
      }
      renderOrd('mat'); renderOrd('mo');
      document.getElementById('tt-x').addEventListener('click',cerrarModal);
      document.getElementById('tt-cu-all').addEventListener('click',function(){ var cks=document.querySelectorAll('.tt-cu'); var allOn=true; Array.prototype.forEach.call(cks,function(c){ if(!c.checked) allOn=false; }); Array.prototype.forEach.call(cks,function(c){ c.checked=!allOn; }); });
      document.getElementById('tt-mo-add').addEventListener('click',function(){
        var nom=document.getElementById('tt-mo-nueva').value.trim(); if(!nom) return;
        sbPost('mano_obra_catalogo',{nombre:nom,tecnologia:'AMBAS',orden:999,activo:true}).then(function(rr){ var m=Array.isArray(rr)?rr[0]:null; if(!m) return; asgMo.push({id:m.id,nombre:m.nombre}); document.getElementById('tt-mo-nueva').value=''; renderOrd('mo'); });
      });
      document.getElementById('tt-save').addEventListener('click',function(){
        var nombre=document.getElementById('tt-nombre').value.trim(); if(!nombre){ document.getElementById('tt-err').textContent='Poné un nombre.'; return; }
        var selCu=[]; Array.prototype.forEach.call(document.querySelectorAll('.tt-cu:checked'),function(ck){ selCu.push(Number(ck.value)); });
        var body={ nombre:nombre, orden:parseInt(document.getElementById('tt-orden').value,10)||100, activo:document.getElementById('tt-activo').checked };
        var btn=this; btn.disabled=true;
        var prom;
        if(t.id){ prom=sbPatch('tipos_trabajo?id=eq.'+t.id,body).then(function(){return t.id;}); }
        else { body.codigo=_slug(nombre)||('TT'+nombre.length); prom=sbPost('tipos_trabajo',body).then(function(rr){ var x=Array.isArray(rr)?rr[0]:null; if(!x) throw 0; return x.id; }); }
        prom.then(function(ttid){
          function syncOrd(tabla,campo,arr){ return fetch(SB_URL+'/rest/v1/'+tabla+'?tipo_trabajo_id=eq.'+ttid,{method:'DELETE',headers:H}).then(function(){ if(!arr.length) return; return sbPost(tabla,arr.map(function(m,i){var o={tipo_trabajo_id:ttid,orden:i*10};o[campo]=m.id;return o;})); }); }
          function sync(tabla,campo,vls){ return fetch(SB_URL+'/rest/v1/'+tabla+'?tipo_trabajo_id=eq.'+ttid,{method:'DELETE',headers:H}).then(function(){ if(!vls.length) return; return sbPost(tabla,vls.map(function(v){var o={tipo_trabajo_id:ttid};o[campo]=v;return o;})); }); }
          return syncOrd('tipo_trabajo_material','material_id',asgMat).then(function(){ return syncOrd('tipo_trabajo_mano_obra','mano_obra_id',asgMo); }).then(function(){ return sync('cuadrilla_tipos_trabajo','cuadrilla_id',selCu); });
        }).then(reloadTrab).then(function(){ cerrarModal(); toast('Tipo de trabajo guardado ✓'); ttList(); })
          .catch(function(){ document.getElementById('tt-err').textContent='No se pudo guardar (¿nombre repetido?).'; btn.disabled=false; });
      });
    });
  }
  function moCatalogo(){
    var cont=document.getElementById('mo-cont'); cont.innerHTML='<div class="center"><div class="spin"></div></div>';

  // ── COBERTURA / RED ── (Leaflet: zonas + NAPs con ocupación + clientes desparramados + chequeo)
  var _MAP=null,_GEOP=[],_GEON=[],_CLI=[],_napOcc={},_napCli={},_lZonas=null,_lNaps=null,_lCli=null,_cbMk=null,_cliMarkers=[];
  function _norm(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }
  function radCli(){ var z=_MAP?_MAP.getZoom():13; return Math.max(2, Math.min(5, 2 + Math.max(0, z-15)*1.0)); } // chico a nivel ciudad/barrio, crece suave solo al acercar mucho
  function vCobertura(){
    view.innerHTML='<h1>Cobertura / Red</h1><p class="sub">Zonas, cajas NAP (con ocupación) y clientes. Chequeá la cobertura de un domicilio.</p>'
      +'<div class="toolbar">'
      +'<input id="cb-q" placeholder="Pegá &quot;lat, lng&quot; o N° de cliente" style="min-width:260px">'
      +'<button class="btn btn-pri" id="cb-check">Chequear cobertura</button>'
      +'<span style="margin-left:14px;font-size:12px;font-weight:700;color:var(--gris)">CAPAS:</span>'
      +'<label style="display:flex;align-items:center;gap:5px"><input type="checkbox" id="cb-zonas" checked> Zonas</label>'
      +'<label style="display:flex;align-items:center;gap:5px"><input type="checkbox" id="cb-naps" checked> NAPs</label>'
      +'<label style="display:flex;align-items:center;gap:5px">Clientes:<select id="cb-cli" style="width:auto"><option value="">Ninguno</option><option value="todos">Todos</option><option value="activo">Activos</option><option value="bloqueado">Bloqueados/Baja</option></select></label>'
      +'<label style="display:flex;align-items:center;gap:5px">Tecnología:<select id="cb-tec" style="width:auto"><option value="">Todas</option><option value="FTTH">FTTH</option><option value="WIRELESS">Wireless</option></select></label>'
      +'<span id="cb-res" style="margin-left:8px;font-weight:700"></span>'
      +'</div><div id="map"></div><div id="cb-info" class="muted" style="margin-top:6px;font-size:12px"></div>';
    if(typeof L==='undefined'){ document.getElementById('map').innerHTML='<div class="center">No se pudo cargar el mapa (revisá tu conexión).</div>'; return; }
    if(_MAP){ try{ _MAP.remove(); }catch(e){} }
    _MAP=null;_lZonas=null;_lNaps=null;_lCli=null;_cbMk=null;
    _MAP=L.map('map').setView([-27.46,-55.89],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(_MAP);
    _MAP.on('zoomend',function(){ var r=radCli(); for(var i=0;i<_cliMarkers.length;i++){ try{ _cliMarkers[i].setRadius(r); }catch(e){} } });
    setTimeout(function(){ if(_MAP) _MAP.invalidateSize(); },250);
    document.getElementById('cb-check').addEventListener('click',cbCheck);
    document.getElementById('cb-q').addEventListener('keydown',function(e){ if(e.key==='Enter') cbCheck(); });
    document.getElementById('cb-zonas').addEventListener('change',function(e){ toggleLayer(_lZonas,e.target.checked); });
    document.getElementById('cb-naps').addEventListener('change',function(e){ toggleLayer(_lNaps,e.target.checked); });
    document.getElementById('cb-cli').addEventListener('change',drawClientes);
    document.getElementById('cb-tec').addEventListener('change',drawClientes);
    cargarGeo();
  }
  function toggleLayer(lyr,on){ if(!lyr||!_MAP) return; if(on) lyr.addTo(_MAP); else _MAP.removeLayer(lyr); }
  function cargarGeo(){
    var info=document.getElementById('cb-info'); if(info) info.textContent='Cargando red y clientes…';
    Promise.all([ sbGet('geo_poligonos?select=nombre,coords&activo=eq.true'), sbGet('geo_naps?select=codigo,lat,lng&activo=eq.true&limit=2000') ]).then(function(r){
      _GEOP=Array.isArray(r[0])?r[0]:[]; _GEON=Array.isArray(r[1])?r[1]:[];
      _lZonas=L.layerGroup().addTo(_MAP);
      _GEOP.forEach(function(p){ if(Array.isArray(p.coords)&&p.coords.length>2){ try{ L.polygon(p.coords,{color:'#2563eb',weight:1.2,fillColor:'#2563eb',fillOpacity:.07,interactive:false}).addTo(_lZonas); }catch(e){} } });
      _CLI=[]; _napOcc={}; _napCli={};
      (function pag(p){
        sbGet('clientes?select=numero_cliente,nombre,estado,tecnologia,lat,lng,caja_nap,geo_origen&or=(caja_nap.not.is.null,lat.not.is.null)&order=id.asc&limit=1000&offset='+(p*1000)).then(function(d){
          if(Array.isArray(d)){ _CLI=_CLI.concat(d); if(d.length===1000){ pag(p+1); return; } }
          _CLI.forEach(function(c){ if(c.caja_nap){ var k=_norm(c.caja_nap); var o=_napOcc[k]||(_napOcc[k]={total:0,activo:0,inact:0}); o.total++; (c.estado==='activo')?o.activo++:o.inact++; (_napCli[k]||(_napCli[k]=[])).push(c); } });
          drawNaps();
          if(info) info.textContent=_GEON.length+' NAP · '+_GEOP.length+' zonas · '+_CLI.length+' clientes con caja/ubicación. (Capacidad de NAP estimada en 16 hasta tener el dato real.)';
        });
      })(0);
    });
  }
  function drawNaps(){
    if(_lNaps){ try{_MAP.removeLayer(_lNaps);}catch(e){} }
    _lNaps=L.layerGroup(); var CAP=16;
    _GEON.forEach(function(n){ if(!(n.lat&&n.lng)) return;
      var k=_norm(n.codigo), o=_napOcc[k]||{total:0,activo:0,inact:0}, libres=Math.max(0,CAP-o.total);
      var color=o.total>=CAP?'#dc2626':(o.total>=CAP*0.75?'#d97706':'#15803d');
      var lista=(_napCli[k]||[]).slice(0,15).map(function(c){ return 'N°'+c.numero_cliente+' '+esc(c.nombre||'')+' <b>('+c.estado+')</b>'; }).join('<br>');
      var capStr = o.total>CAP
        ? '<span style="color:#dc2626">⚠️ '+o.total+' conectados superan la capacidad estimada ('+CAP+') — revisar</span>'
        : 'Capacidad est.: '+CAP+' → <b>'+libres+' puertos libres</b>';
      L.circleMarker([n.lat,n.lng],{radius:6,color:'#fff',weight:1.5,fillColor:color,fillOpacity:1})
        .bindPopup('<b>📦 NAP '+esc(n.codigo)+'</b><br>Conectados: <b>'+o.total+'</b> ('+o.activo+' activos · '+o.inact+' baja/bloq)<br>'+capStr+'<hr style="margin:6px 0;border:none;border-top:1px solid #e2e8f0"><div style="max-height:140px;overflow:auto;font-size:12px;color:#475569">'+(lista||'(sin clientes cargados)')+'</div>')
        .addTo(_lNaps);
    });
    if(document.getElementById('cb-naps') && document.getElementById('cb-naps').checked) _lNaps.addTo(_MAP);
  }
  function drawClientes(){
    if(_lCli){ try{_MAP.removeLayer(_lCli);}catch(e){} _lCli=null; }
    var fe=document.getElementById('cb-cli').value, ft=document.getElementById('cb-tec').value;
    if(!fe) return;
    _lCli=L.layerGroup().addTo(_MAP); _cliMarkers=[];
    var rn=L.canvas(), col={activo:'#16a34a',bloqueado:'#dc2626',baja:'#94a3b8',suspendido:'#d97706',moroso:'#d97706'}, R=radCli();
    _CLI.forEach(function(c){
      if(c.lat==null||c.lng==null) return;
      if(fe==='activo' && c.estado!=='activo') return;
      if(fe==='bloqueado' && c.estado==='activo') return;
      if(ft==='FTTH' && c.tecnologia!=='FTTH') return;
      if(ft==='WIRELESS' && c.tecnologia!=='INALAMBRICO') return;
      var p=_jit(c), cc=(col[c.estado]||'#2563eb');
      var mk=L.circleMarker(p,{renderer:rn,radius:R,color:cc,weight:1,fillColor:cc,fillOpacity:.7})
        .bindPopup('<b>N° '+c.numero_cliente+'</b> '+esc(c.nombre||'')+'<br>Estado: <b>'+esc(c.estado)+'</b>'+(c.tecnologia?(' · '+esc(c.tecnologia)):'')+(c.caja_nap?('<br>NAP: '+esc(c.caja_nap)):'')+(c.geo_origen?('<br><span style="color:#64748b">ubicación: '+esc(c.geo_origen)+'</span>'):''))
        .bindTooltip('N°'+c.numero_cliente+' '+esc(c.nombre||''));
      mk.addTo(_lCli); _cliMarkers.push(mk);
    });
  }
  function _jit(c){
    if(c.geo_origen!=='nap') return [c.lat,c.lng];   // GPS real (solicitud) = exacto
    var s=(c.numero_cliente||0), ang=(s*97%360)*Math.PI/180, rad=0.00016+0.00032*((s*53%100)/100);
    return [c.lat+rad*Math.cos(ang), c.lng+rad*Math.sin(ang)];  // desparramar alrededor de la NAP
  }
  function cbCheck(){
    var q=document.getElementById('cb-q').value.trim(), res=document.getElementById('cb-res');
    function evaluar(lat,lng,label){
      if(_cbMk){ _MAP.removeLayer(_cbMk); }
      _cbMk=L.marker([lat,lng]).addTo(_MAP); _MAP.setView([lat,lng],16);
      var cob=_GEOP.filter(function(p){ return Array.isArray(p.coords)&&pointInPoly(lat,lng,p.coords); }).map(function(p){return p.nombre;});
      var best=null,bd=1e12; _GEON.forEach(function(n){ if(n.lat&&n.lng){ var dd=hav(lat,lng,n.lat,n.lng); if(dd<bd){bd=dd;best=n;} } });
      _cbMk.bindPopup((label?('<b>'+esc(label)+'</b><br>'):'')
        +(cob.length?('✅ En cobertura: '+esc(cob.join(', '))):'⚠️ Fuera de las zonas de cobertura')
        +'<br>NAP más cercana: '+(best?(esc(best.codigo)+' · '+Math.round(bd)+' m'):'—')).openPopup();
      res.innerHTML=cob.length?'<span style="color:var(--ok)">✅ En cobertura</span>':'<span style="color:var(--warn)">⚠️ Sin polígono (NAP a '+(best?Math.round(bd):'?')+' m)</span>';
    }
    var ll=parseCoords(q);
    if(ll){ evaluar(ll.lat,ll.lng,'Punto consultado'); return; }
    if(/^\d+$/.test(q)){ sbGet('clientes?numero_cliente=eq.'+q+'&select=nombre,lat,lng&limit=1').then(function(d){ var c=(d||[])[0]; if(!c){ res.textContent='No existe ese cliente.'; return; } if(c.lat==null){ res.textContent='Ese cliente no tiene ubicación.'; return; } evaluar(c.lat,c.lng,'N° '+q+' '+(c.nombre||'')); }); return; }
    res.textContent='Pegá "lat, lng" o un N° de cliente.';
  }
  function parseCoords(t){ var m=String(t||'').match(/-?\d{1,3}\.\d+\s*,\s*-?\d{1,3}\.\d+/); if(!m) return null; var p=m[0].split(/\s*,\s*/); var a=parseFloat(p[0]),b=parseFloat(p[1]); if(a<-90||a>90||b<-180||b>180) return null; return {lat:a,lng:b}; }
  function pointInPoly(lat,lng,poly){ var inside=false; for(var i=0,j=poly.length-1;i<poly.length;j=i++){ var yi=poly[i][0],xi=poly[i][1],yj=poly[j][0],xj=poly[j][1]; if(((yi>lat)!==(yj>lat)) && (lng < (xj-xi)*(lat-yi)/(yj-yi)+xi)) inside=!inside; } return inside; }
  function hav(la1,lo1,la2,lo2){ var R=6371000,d=Math.PI/180,s1=Math.sin((la2-la1)*d/2),s2=Math.sin((lo2-lo1)*d/2); var a=s1*s1+Math.cos(la1*d)*Math.cos(la2*d)*s2*s2; return 2*R*Math.asin(Math.sqrt(a)); }

  function stipPill(t){ if(t==='INDIVIDUAL') return '<span class="pill p-ASIGNADA">equipo · serial</span>'; if(t==='CORRELATIVO') return '<span class="pill p-EN_CURSO">precinto · rango</span>'; return '<span class="pill p-baja">sin serie</span>'; }
  function pad6(n){ var s=String(parseInt(n,10)); while(s.length<6) s='0'+s; return s; }
  function normSerial(s){ return String(s||'').trim().toUpperCase().replace(/[\s:\-]/g,''); }

  function ingDyn(){

      dyn.querySelector('#ing-ser').addEventListener('input',function(){ document.getElementById('ing-prev').textContent=_parseSeriales(this.value).length+' seriales'; });

  function ingAdd(){
    var m=_matById(document.getElementById('ing-mat').value); if(!m) return;
    var item={ material_id:m.id, nombre:m.nombre, unidad:m.unidad, serial_tipo:m.serial_tipo, cantidad:0, seriales:[] };

      if(m.cant_por_paquete>1){ var paq=parseInt(document.getElementById('ing-paq').value,10); if(!(paq>0)){ toast('Cantidad de paquetes inválida.'); return; } item.cantidad=paq*m.cant_por_paquete; item.detalle=paq+' '+(m.nombre_paquete||'paq')+' × '+m.cant_por_paquete; }

  function _insertSeriales(matId, seriales){
    var dup=0, ok=0, i=0, BATCH=200;
    function next(){
      if(i>=seriales.length) return Promise.resolve({ok:ok,dup:dup});
      var lote=seriales.slice(i,i+BATCH).map(function(s){return {material_id:Number(matId),serial:s,estado:'EN_DEPOSITO'};}); i+=BATCH;
      return sbPost('stock_seriales',lote).then(function(r){ if(Array.isArray(r)){ ok+=r.length; return next(); } throw 0; })
        .catch(function(){ var j=0; function one(){ if(j>=lote.length) return next(); var reg=lote[j++]; return sbPost('stock_seriales',reg).then(function(rr){ if(Array.isArray(rr)&&rr.length) ok++; else dup++; return one(); }).catch(function(){ dup++; return one(); }); } return one(); });
    }
    return next();
  }
  function ingConfirm(){
    if(!INGRESO_TEMP.length) return;
    var btn=document.getElementById('ing-confirm'); btn.disabled=true; btn.textContent='Procesando…';
    var items=INGRESO_TEMP.slice(), idx=0;
    function step(){
      if(idx>=items.length){ INGRESO_TEMP=[]; toast('Ingreso confirmado ✓'); depState.tab='deposito'; vDeposito(); return; }
      var it=items[idx++];
      var p=(it.serial_tipo==='NINGUNO')? _upsertDeposito(it.material_id,it.cantidad) : _insertSeriales(it.material_id,it.seriales);
      p.then(function(res){ return sbPost('stock_movimientos',{material_id:Number(it.material_id),tipo:'INGRESO',cantidad:(res&&res.ok!=null?res.ok:it.cantidad),usuario_id:USER.id,observaciones:(res&&res.dup?('('+res.dup+' duplicados omitidos)'):null)}); })
        .then(step).catch(step);
    }
    step();
  }

  // ===== STOCK DEPÓSITO (vista, contando seriales) =====
  function depStock(){

    Promise.all([ sbGet('catalogo_materiales?select=*&activo=eq.true&order=orden.asc'), sbGet('stock_deposito?select=material_id,cantidad'), _conteoSeriales('EN_DEPOSITO') ]).then(function(r){
      var mats=Array.isArray(r[0])?r[0]:[], st=Array.isArray(r[1])?r[1]:[], serCnt=r[2]||{}, smap={};
      st.forEach(function(s){ smap[s.material_id]=Number(s.cantidad)||0; });
      var h='<div class="toolbar"><button class="btn btn-ok" id="dep-entregar">🚚 Entregar a una cuadrilla</button></div>'
        +'<table><thead><tr><th>Material</th><th>Tecnología</th><th>Serial</th><th>En depósito</th></tr></thead><tbody>';
      mats.forEach(function(m){ var c=(m.serial_tipo&&m.serial_tipo!=='NINGUNO')?(serCnt[m.id]||0):(smap[m.id]||0);
        h+='<tr><td><b>'+esc(m.nombre)+'</b></td><td>'+tecPill(m.tecnologia)+'</td><td>'+stipPill(m.serial_tipo)+'</td><td><b>'+c+'</b> <span class="muted">'+esc(m.unidad||'')+'</span></td></tr>';
      });
      h+='</tbody></table>'; cont.innerHTML=h;
      document.getElementById('dep-entregar').addEventListener('click',function(){ entregaCuad(null); });
    });
  }

  // ===== ENTREGA a cuadrilla (con traslado de serial DEPÓSITO → CUADRILLA) =====
  function entregaCuad(presetCuad){
    if(!REF.cuadrillas.length){ toast('No hay cuadrillas activas cargadas.'); return; }
    var cuadOpts=REF.cuadrillas.map(function(c){return '<option value="'+c.id+'"'+(presetCuad==c.id?' selected':'')+'>'+esc(c.nombre)+'</option>';}).join('');
    sbGet('catalogo_materiales?select=id,nombre,unidad,serial_tipo&activo=eq.true&order=orden.asc').then(function(d){
      window._entMats=Array.isArray(d)?d:[];
      var matOpts='<option value="">— material —</option>'+window._entMats.map(function(m){return '<option value="'+m.id+'">'+esc(m.nombre)+'</option>';}).join('');
      modal('<h2>Entregar a cuadrilla</h2>'
        +'<label class="l">Cuadrilla</label><select id="ent-cuad">'+cuadOpts+'</select>'
        +'<label class="l">Material</label><select id="ent-mat">'+matOpts+'</select>'
        +'<div id="ent-dyn" style="margin-top:6px"></div>'
        +'<div id="ent-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
        +'<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ok" id="ent-go" disabled>Entregar</button><button class="btn btn-2" id="ent-x">Cerrar</button></div>');
      document.getElementById('ent-x').addEventListener('click',cerrarModal);
      document.getElementById('ent-mat').addEventListener('change',entDyn);
      document.getElementById('ent-go').addEventListener('click',entGo);
    });
  }
  function entDyn(){
    var m=(window._entMats||[]).filter(function(x){return x.id==document.getElementById('ent-mat').value;})[0];
    var dyn=document.getElementById('ent-dyn'), go=document.getElementById('ent-go');
    if(!m){ dyn.innerHTML=''; go.disabled=true; return; }
    go.disabled=false;
    if(m.serial_tipo==='NINGUNO'){
      sbGet('stock_deposito?material_id=eq.'+m.id+'&select=cantidad').then(function(d){ var disp=(d&&d[0])?Number(d[0].cantidad)||0:0;
        dyn.innerHTML='<label class="l">Cantidad <span class="muted">(en depósito: '+disp+')</span></label><input id="ent-cant" type="number" min="1" value="1" data-disp="'+disp+'">'; });
    } else if(m.serial_tipo==='CORRELATIVO'){
      dyn.innerHTML='<div class="row"><div><label class="l">Primer número</label><input id="ent-ini" type="number" min="0"></div><div><label class="l">Cantidad</label><input id="ent-cant" type="number" min="1"></div></div><div id="ent-prev" class="muted" style="font-size:12px;margin-top:4px"></div>';
      var upd=function(){ var i=parseInt(document.getElementById('ent-ini').value,10), c=parseInt(document.getElementById('ent-cant').value,10); document.getElementById('ent-prev').textContent=(i>=0&&c>0)?('→ del '+pad6(i)+' al '+pad6(i+c-1)):''; };
      dyn.querySelector('#ent-ini').addEventListener('input',upd); dyn.querySelector('#ent-cant').addEventListener('input',upd);
    } else {
      dyn.innerHTML='<div class="muted">Cargando seriales en depósito…</div>';
      sbGet('stock_seriales?estado=eq.EN_DEPOSITO&material_id=eq.'+m.id+'&select=serial&order=serial&limit=3000').then(function(d){
        var ss=Array.isArray(d)?d:[];
        if(!ss.length){ dyn.innerHTML='<div class="muted">No hay seriales de este equipo en depósito. Cargalos primero en Ingreso.</div>'; return; }
        dyn.innerHTML='<label class="l">Elegí los equipos a entregar ('+ss.length+' en depósito)</label><div id="ent-ser" style="max-height:180px;overflow:auto;border:1px solid var(--bord);border-radius:8px;padding:8px">'
          +ss.map(function(s){return '<label style="display:block;font-weight:500"><input type="checkbox" class="ent-ck" value="'+esc(s.serial)+'"> '+esc(s.serial)+'</label>';}).join('')+'</div><div id="ent-prev" class="muted" style="font-size:12px;margin-top:4px">0 elegidos</div>';
        Array.prototype.forEach.call(dyn.querySelectorAll('.ent-ck'),function(ck){ ck.addEventListener('change',function(){ document.getElementById('ent-prev').textContent=dyn.querySelectorAll('.ent-ck:checked').length+' elegidos'; }); });
      });
    }
  }
  function entGo(){
    var cuad=Number(document.getElementById('ent-cuad').value);
    var m=(window._entMats||[]).filter(function(x){return x.id==document.getElementById('ent-mat').value;})[0];
    var err=document.getElementById('ent-err'); if(!m||!cuad){ err.textContent='Elegí cuadrilla y material.'; return; }
    var btn=document.getElementById('ent-go'); btn.disabled=true; btn.textContent='Entregando…';
    function fin(n){ return sbPost('stock_movimientos',{material_id:Number(m.id),tipo:'ENTREGA_CUADRILLA',cantidad:n,cuadrilla_id:cuad,usuario_id:USER.id}).then(function(){ cerrarModal(); toast('Entregado a la cuadrilla ✓'); if(depState.tab==='cuadrillas') cargarStockCuad(); else depStock(); }); }
    function falla(msg){ err.textContent=msg||'No se pudo completar.'; btn.disabled=false; btn.textContent='Entregar'; }
    if(m.serial_tipo==='NINGUNO'){
      var inp=document.getElementById('ent-cant'), n=parseFloat(inp.value), disp=Number(inp.getAttribute('data-disp'))||0;
      if(!(n>0)) return falla('Cantidad inválida.');
      if(n>disp) return falla('No hay tanto en depósito (hay '+disp+').');
      _upsertDeposito(m.id,-n)
        .then(function(){ return sbGet('stock_cuadrillas?cuadrilla_id=eq.'+cuad+'&material_id=eq.'+m.id+'&select=id,cantidad'); })
        .then(function(d){ if(Array.isArray(d)&&d.length) return sbPatch('stock_cuadrillas?id=eq.'+d[0].id,{cantidad:(Number(d[0].cantidad)||0)+n,updated_at:new Date().toISOString()}); return sbPost('stock_cuadrillas',{cuadrilla_id:cuad,material_id:Number(m.id),cantidad:n}); })
        .then(function(){ return fin(n); }).catch(function(){ falla(); });
    } else {
      var seriales=[];
      if(m.serial_tipo==='CORRELATIVO'){ var i=parseInt(document.getElementById('ent-ini').value,10), c=parseInt(document.getElementById('ent-cant').value,10); if(!(i>=0)||!(c>0)) return falla('Completá número y cantidad.'); for(var k=0;k<c;k++) seriales.push(pad6(i+k)); }
      else { Array.prototype.forEach.call(document.querySelectorAll('#ent-ser .ent-ck:checked'),function(ck){ seriales.push(ck.value); }); if(!seriales.length) return falla('Elegí al menos un equipo.'); }
      var movidos=0, faltan=[];
      var seq=seriales.reduce(function(pr,ser){ return pr.then(function(){
        return sbGet('stock_seriales?material_id=eq.'+m.id+'&serial=eq.'+encodeURIComponent(ser)+'&estado=eq.EN_DEPOSITO&select=id').then(function(d){
          if(Array.isArray(d)&&d.length) return sbPatch('stock_seriales?id=eq.'+d[0].id,{estado:'EN_CUADRILLA',cuadrilla_id:cuad}).then(function(){ movidos++; });
          faltan.push(ser);
        });
      }); }, Promise.resolve());
      seq.then(function(){ if(!movidos) return falla('Ninguno de esos seriales está en depósito'+(faltan.length?(' ('+faltan.slice(0,5).join(', ')+'…)'):'')+'.'); if(faltan.length) toast(faltan.length+' serial(es) no estaban en depósito, se omitieron.'); return fin(movidos); }).catch(function(){ falla(); });
    }
  }

  // ===== STOCK CUADRILLAS (vista, contando seriales) =====
  function depCuadrillas(){
    var cont=document.getElementById('dep-cont');
    var cuadOpts='<option value="">— elegí una cuadrilla —</option>'+REF.cuadrillas.map(function(c){return '<option value="'+c.id+'"'+(depState.cuad==c.id?' selected':'')+'>'+esc(c.nombre)+'</option>';}).join('');
    cont.innerHTML='<div class="toolbar"><span class="muted">Stock de:</span><select id="dc-cuad" style="width:auto">'+cuadOpts+'</select><button class="btn btn-ok" id="dc-entregar" style="margin-left:auto">🚚 Entregar materiales</button></div><div id="dc-tabla"></div>';
    document.getElementById('dc-cuad').addEventListener('change',function(){ depState.cuad=this.value; cargarStockCuad(); });
    document.getElementById('dc-entregar').addEventListener('click',function(){ entregaCuad(depState.cuad||null); });
