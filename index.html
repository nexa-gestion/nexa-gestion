  function cargarStockCuad(){
    var t=document.getElementById('dc-tabla'); if(!t) return; if(!depState.cuad){ t.innerHTML='<div class="center">Elegí una cuadrilla.</div>'; return; }
    t.innerHTML='<div class="center"><div class="spin"></div></div>';
    Promise.all([ sbGet('catalogo_materiales?select=id,nombre,unidad,tecnologia,serial_tipo,orden&order=orden.asc'), sbGet('stock_cuadrillas?cuadrilla_id=eq.'+depState.cuad+'&select=material_id,cantidad'), _conteoSeriales('EN_CUADRILLA',depState.cuad) ]).then(function(r){
      var mats=Array.isArray(r[0])?r[0]:[], sc=Array.isArray(r[1])?r[1]:[], serCnt=r[2]||{}, scmap={};
      sc.forEach(function(s){ scmap[s.material_id]=Number(s.cantidad)||0; });
      var rows=mats.map(function(m){ var c=(m.serial_tipo&&m.serial_tipo!=='NINGUNO')?(serCnt[m.id]||0):(scmap[m.id]||0); return {m:m,c:c}; }).filter(function(x){return x.c>0;});
      if(!rows.length){ t.innerHTML='<div class="center">Esta cuadrilla todavía no tiene stock cargado.</div>'; return; }
      var h='<table><thead><tr><th>Material</th><th>Tecnología</th><th>Serial</th><th>Cantidad</th><th></th></tr></thead><tbody>';
      rows.forEach(function(x){ h+='<tr><td><b>'+esc(x.m.nombre)+'</b></td><td>'+tecPill(x.m.tecnologia)+'</td><td>'+stipPill(x.m.serial_tipo)+'</td><td><b>'+x.c+'</b> <span class="muted">'+esc(x.m.unidad||'')+'</span></td>'
        +'<td style="white-space:nowrap"><button class="btn btn-2 sc-dev" data-mid="'+x.m.id+'" data-n="'+esc(x.m.nombre)+'" data-st="'+x.m.serial_tipo+'" data-c="'+x.c+'">↩️ Devolver</button>'+(x.m.serial_tipo==='NINGUNO'?(' <button class="btn btn-2 sc-aj" data-mid="'+x.m.id+'" data-n="'+esc(x.m.nombre)+'" data-c="'+x.c+'">⚖️ Ajustar</button>'):'')+'</td></tr>'; });
      h+='</tbody></table>'; t.innerHTML=h;
      Array.prototype.forEach.call(t.querySelectorAll('.sc-dev'),function(b){ b.addEventListener('click',function(){ devolverStock(b.getAttribute('data-mid'),b.getAttribute('data-n'),b.getAttribute('data-st'),Number(b.getAttribute('data-c'))); }); });
      Array.prototype.forEach.call(t.querySelectorAll('.sc-aj'),function(b){ b.addEventListener('click',function(){ ajustarStock(b.getAttribute('data-mid'),b.getAttribute('data-n'),Number(b.getAttribute('data-c'))); }); });
    });
  }
  // — Devolución cuadrilla → depósito (serial-aware) —
  function devolverStock(matId,nombre,stip,disp){
    var cuad=depState.cuad;
    if(stip==='NINGUNO'){
      modal('<h2>Devolver al depósito</h2><p class="muted">'+esc(nombre)+' · en la cuadrilla: <b>'+disp+'</b></p>'
        +'<label class="l">Cantidad a devolver</label><input id="dv-cant" type="number" min="1" max="'+disp+'" value="'+disp+'">'
        +'<div id="dv-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
        +'<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ok" id="dv-go">Devolver</button><button class="btn btn-2" id="dv-x">Cancelar</button></div>');
      document.getElementById('dv-x').addEventListener('click',cerrarModal);
      document.getElementById('dv-go').addEventListener('click',function(){
        var n=parseFloat(document.getElementById('dv-cant').value); if(!(n>0)||n>disp){ document.getElementById('dv-err').textContent='Cantidad inválida (máx '+disp+').'; return; }
        var btn=this; btn.disabled=true;
        sbGet('stock_cuadrillas?cuadrilla_id=eq.'+cuad+'&material_id=eq.'+matId+'&select=id,cantidad')
          .then(function(d){ if(Array.isArray(d)&&d.length) return sbPatch('stock_cuadrillas?id=eq.'+d[0].id,{cantidad:(Number(d[0].cantidad)||0)-n,updated_at:new Date().toISOString()}); })
          .then(function(){ return _upsertDeposito(matId,n); })
          .then(function(){ return sbPost('stock_movimientos',{material_id:Number(matId),tipo:'DEVOLUCION',cantidad:n,cuadrilla_id:Number(cuad),usuario_id:USER.id}); })
          .then(function(){ cerrarModal(); toast('Devuelto al depósito ✓'); cargarStockCuad(); })
          .catch(function(){ document.getElementById('dv-err').textContent='No se pudo completar.'; btn.disabled=false; });
      });
    } else {
      sbGet('stock_seriales?estado=eq.EN_CUADRILLA&cuadrilla_id=eq.'+cuad+'&material_id=eq.'+matId+'&select=serial&order=serial&limit=3000').then(function(d){
        var ss=Array.isArray(d)?d:[];
        modal('<h2>Devolver al depósito</h2><p class="muted">'+esc(nombre)+'</p>'
          +'<label class="l">Elegí los equipos a devolver ('+ss.length+')</label><div id="dv-ser" style="max-height:200px;overflow:auto;border:1px solid var(--bord);border-radius:8px;padding:8px">'+(ss.length?ss.map(function(s){return '<label style="display:block;font-weight:500"><input type="checkbox" class="dv-ck" value="'+esc(s.serial)+'"> '+esc(s.serial)+'</label>';}).join(''):'<span class="muted">sin seriales</span>')+'</div>'
          +'<div id="dv-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
          +'<div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-ok" id="dv-go">Devolver</button><button class="btn btn-2" id="dv-x">Cancelar</button></div>');
        document.getElementById('dv-x').addEventListener('click',cerrarModal);
        document.getElementById('dv-go').addEventListener('click',function(){
          var sers=[]; Array.prototype.forEach.call(document.querySelectorAll('#dv-ser .dv-ck:checked'),function(ck){ sers.push(ck.value); });
          if(!sers.length){ document.getElementById('dv-err').textContent='Elegí al menos uno.'; return; }
          var btn=this; btn.disabled=true;
          var seq=sers.reduce(function(pr,ser){ return pr.then(function(){ return sbGet('stock_seriales?material_id=eq.'+matId+'&serial=eq.'+encodeURIComponent(ser)+'&estado=eq.EN_CUADRILLA&cuadrilla_id=eq.'+cuad+'&select=id').then(function(d){ if(Array.isArray(d)&&d.length) return sbPatch('stock_seriales?id=eq.'+d[0].id,{estado:'EN_DEPOSITO',cuadrilla_id:null}); }); }); }, Promise.resolve());
          seq.then(function(){ return sbPost('stock_movimientos',{material_id:Number(matId),tipo:'DEVOLUCION',cantidad:sers.length,cuadrilla_id:Number(cuad),usuario_id:USER.id}); })
            .then(function(){ cerrarModal(); toast('Devuelto al depósito ✓'); cargarStockCuad(); })
            .catch(function(){ document.getElementById('dv-err').textContent='No se pudo completar.'; btn.disabled=false; });
        });
      });
    }
  }
  // — Ajuste manual del stock de cuadrilla (no serializados) —
  function ajustarStock(matId,nombre,actual){

    modal('<h2>Ajustar stock de la cuadrilla</h2><p class="muted">'+esc(nombre)+' · actual: <b>'+actual+'</b></p>'
      +'<label class="l">Cantidad real (corregida)</label><input id="aj-cant" type="number" min="0" value="'+actual+'">'

  function cuLista(){
    var cont=document.getElementById('cu-cont'); cont.innerHTML='<div class="center"><div class="spin"></div></div>';
    Promise.all([ sbGet('cuadrillas?select=*&order=activa.desc,nombre'), sbGet('tecnicos?select=id,nombre,cuadrilla_id&order=nombre') ]).then(function(r){
      var cuads=Array.isArray(r[0])?r[0]:[], tecs=Array.isArray(r[1])?r[1]:[], porCuad={};
      tecs.forEach(function(t){ if(t.cuadrilla_id){ (porCuad[t.cuadrilla_id]||(porCuad[t.cuadrilla_id]=[])).push(t.nombre); } });
      var h='<div class="toolbar"><button class="btn btn-ok" id="cu-nueva">+ Nueva cuadrilla</button><span class="muted">'+cuads.length+' cuadrillas</span></div>';

      h+='<table><thead><tr><th>Cuadrilla</th><th>Técnicos</th><th>Estado</th></tr></thead><tbody>';
      cuads.forEach(function(c){ h+='<tr data-id="'+c.id+'" style="cursor:pointer"><td><b>'+esc(c.nombre)+'</b></td><td class="muted">'+((porCuad[c.id]||[]).map(esc).join(' · '))+((porCuad[c.id]||[]).length?'':'<span style="color:#cbd5e1">sin técnicos</span>')+'</td><td>'+(c.activa?'<span class="pill p-activo">activa</span>':'<span class="pill p-baja">inactiva</span>')+'</td></tr>'; });
      h+='</tbody></table>'; cont.innerHTML=h;
      document.getElementById('cu-nueva').addEventListener('click',function(){ formCuadrilla(null); });
      Array.prototype.forEach.call(cont.querySelectorAll('tr[data-id]'),function(tr){ tr.addEventListener('click',function(){ formCuadrilla(cuads.filter(function(x){return x.id==tr.getAttribute('data-id');})[0]); }); });
    });

  function formCuadrilla(c){
    c=c||{};
    sbGet('tecnicos?select=id,nombre,cuadrilla_id&activo=eq.true&order=nombre').then(function(d){
      var tecs=Array.isArray(d)?d:[], cuadNom={}; REF.cuadrillas.forEach(function(x){ cuadNom[x.id]=x.nombre; });
      var checks=tecs.map(function(t){ var mine=(t.cuadrilla_id==c.id), otra=(t.cuadrilla_id&&t.cuadrilla_id!=c.id);
        return '<label style="display:block;font-weight:500;'+(otra?'color:#b45309':'')+'"><input type="checkbox" class="cu-tec" value="'+t.id+'"'+(mine?' checked':'')+'> '+esc(t.nombre)+(otra?(' <span class="muted">(en '+esc(cuadNom[t.cuadrilla_id]||'otra')+')</span>'):'')+'</label>'; }).join('');
      modal('<h2>'+(c.id?'Editar':'Nueva')+' cuadrilla</h2>'
        +'<label class="l">Nombre</label><input id="cu-nombre" value="'+esc(c.nombre||'')+'" placeholder="Ej: Raúl / Fer">'
        +'<div class="row"><div><label class="l">Color (mapa)</label><input id="cu-color" value="'+esc(c.color||'')+'" placeholder="#2563eb"></div><div><label class="l">Estado</label><select id="cu-activa"><option value="true"'+(c.activa!==false?' selected':'')+'>Activa</option><option value="false"'+(c.activa===false?' selected':'')+'>Inactiva</option></select></div></div>'
        +'<label class="l">Técnicos de esta cuadrilla</label><div style="max-height:200px;overflow:auto;border:1px solid var(--bord);border-radius:8px;padding:8px">'+(checks||'<span class="muted">No hay técnicos cargados. Creálos en la pestaña Técnicos.</span>')+'</div>'
        +'<div id="cu-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
        +'<div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-ok" id="cu-save">Guardar</button><button class="btn btn-2" id="cu-x">Cancelar</button></div>');
      document.getElementById('cu-x').addEventListener('click',cerrarModal);
      document.getElementById('cu-save').addEventListener('click',function(){
        var body={ nombre:document.getElementById('cu-nombre').value.trim(), color:document.getElementById('cu-color').value.trim()||null, activa:document.getElementById('cu-activa').value==='true' };
        if(!body.nombre){ document.getElementById('cu-err').textContent='Poné un nombre.'; return; }
        var sel=[]; Array.prototype.forEach.call(document.querySelectorAll('.cu-tec:checked'),function(ck){ sel.push(Number(ck.value)); });
        var btn=this; btn.disabled=true;
        var prom=c.id? sbPatch('cuadrillas?id=eq.'+c.id,body).then(function(){return c.id;}) : sbPost('cuadrillas',body).then(function(r){ return (Array.isArray(r)&&r[0])?r[0].id:null; });
        prom.then(function(cuadId){
          if(!cuadId) throw 0;
          var ops=[];
          tecs.forEach(function(t){ var nowMine=(sel.indexOf(t.id)>=0), wasMine=(t.cuadrilla_id==cuadId);
            if(nowMine && t.cuadrilla_id!=cuadId) ops.push(sbPatch('tecnicos?id=eq.'+t.id,{cuadrilla_id:cuadId}));
            else if(!nowMine && wasMine) ops.push(sbPatch('tecnicos?id=eq.'+t.id,{cuadrilla_id:null})); });
          return Promise.all(ops);
        }).then(reloadCuadrillas).then(function(){ cerrarModal(); toast('Cuadrilla guardada ✓'); cuLista(); })
          .catch(function(){ document.getElementById('cu-err').textContent='No se pudo guardar.'; btn.disabled=false; });
      });
    });
  }
  function tecLista(){
    var cont=document.getElementById('cu-cont'); cont.innerHTML='<div class="center"><div class="spin"></div></div>';
    sbGet('tecnicos?select=*,cuadrillas(nombre)&order=nombre').then(function(d){
      var tecs=Array.isArray(d)?d:[];
      var h='<div class="toolbar"><button class="btn btn-ok" id="tec-nuevo">+ Nuevo técnico</button><span class="muted">'+tecs.length+' técnicos</span></div>';
      if(!tecs.length){ cont.innerHTML=h+'<div class="center">Todavía no hay técnicos.</div>'; document.getElementById('tec-nuevo').addEventListener('click',function(){ formTecnico(null); }); return; }
      h+='<table><thead><tr><th>Técnico</th><th>Teléfono</th><th>Cuadrilla</th><th>Estado</th></tr></thead><tbody>';
      tecs.forEach(function(t){ h+='<tr data-id="'+t.id+'" style="cursor:pointer"><td><b>'+esc(t.nombre)+'</b></td><td>'+esc(t.telefono||'—')+'</td><td>'+esc(t.cuadrillas?t.cuadrillas.nombre:'—')+'</td><td>'+(t.activo?'<span class="pill p-activo">activo</span>':'<span class="pill p-baja">inactivo</span>')+'</td></tr>'; });
      h+='</tbody></table>'; cont.innerHTML=h;
      document.getElementById('tec-nuevo').addEventListener('click',function(){ formTecnico(null); });
      Array.prototype.forEach.call(cont.querySelectorAll('tr[data-id]'),function(tr){ tr.addEventListener('click',function(){ formTecnico(tecs.filter(function(x){return x.id==tr.getAttribute('data-id');})[0]); }); });
    });
  }
  function formTecnico(t){
    t=t||{};
    var cuadOpts='<option value="">— sin cuadrilla —</option>'+REF.cuadrillas.map(function(c){return '<option value="'+c.id+'"'+(t.cuadrilla_id==c.id?' selected':'')+'>'+esc(c.nombre)+'</option>';}).join('');
    modal('<h2>'+(t.id?'Editar':'Nuevo')+' técnico</h2>'
      +'<label class="l">Nombre</label><input id="tec-nombre" value="'+esc(t.nombre||'')+'" placeholder="Nombre y apellido">'
      +'<div class="row"><div><label class="l">Teléfono</label><input id="tec-tel" value="'+esc(t.telefono||'')+'"></div><div><label class="l">Cuadrilla</label><select id="tec-cuad">'+cuadOpts+'</select></div></div>'
      +'<div style="margin-top:12px"><label style="font-weight:600"><input type="checkbox" id="tec-activo"'+(t.activo!==false?' checked':'')+'> Activo</label></div>'
      +'<div id="tec-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
      +'<div style="display:flex;gap:8px;margin-top:14px"><button class="btn btn-ok" id="tec-save">Guardar</button><button class="btn btn-2" id="tec-x">Cancelar</button></div>');
    document.getElementById('tec-x').addEventListener('click',cerrarModal);
    document.getElementById('tec-save').addEventListener('click',function(){
      var cv=document.getElementById('tec-cuad').value;
      var body={ nombre:document.getElementById('tec-nombre').value.trim(), telefono:document.getElementById('tec-tel').value.trim()||null, cuadrilla_id:cv?Number(cv):null, activo:document.getElementById('tec-activo').checked };
      if(!body.nombre){ document.getElementById('tec-err').textContent='Poné un nombre.'; return; }
      var btn=this; btn.disabled=true;
      var prom=t.id? sbPatch('tecnicos?id=eq.'+t.id,body) : sbPost('tecnicos',body);
      prom.then(function(r){ if(!t.id && (!Array.isArray(r)||!r.length)) throw 0; cerrarModal(); toast('Técnico guardado ✓'); tecLista(); })
        .catch(function(){ document.getElementById('tec-err').textContent='No se pudo guardar.'; btn.disabled=false; });
    });
  }

  // ── CUENTAS TV (Espacio Giga) ── (pool de cuentas de TV online; reemplaza la planilla)
  var tvState={ q:'', estado:'' };
  function tvPill(e){ var m={DISPONIBLE:'p-activo',EN_USO:'p-ASIGNADA',BAJA_PENDIENTE:'p-suspendido'}; return '<span class="pill '+(m[e]||'p-baja')+'">'+esc(e==='BAJA_PENDIENTE'?'a cambiar clave':(e||'').toLowerCase().replace('_',' '))+'</span>'; }
  function vCuentasTV(){
    view.innerHTML='<h1>Cuentas TV (Espacio Giga)</h1><p class="sub">Pool de cuentas de TV online. Reemplaza la planilla.</p>'
      +'<div class="kpis" id="tv-kpis"></div>'
      +'<div class="toolbar" style="margin-top:14px"><input id="tv-q" placeholder="Buscar usuario / mail / abonado" style="min-width:240px" value="'+esc(tvState.q)+'">'
      +'<select id="tv-estado"><option value="">Todos</option>'+opt(['DISPONIBLE','EN_USO','BAJA_PENDIENTE'],tvState.estado)+'</select>'
      +'<button class="btn btn-pri" id="tv-buscar">Buscar</button>'
      +'<button class="btn btn-ok" id="tv-nueva" style="margin-left:auto">+ Nueva cuenta</button></div>'
      +'<div id="tv-tabla"></div>';
    function leer(){ tvState.q=document.getElementById('tv-q').value.trim(); tvState.estado=document.getElementById('tv-estado').value; }
    document.getElementById('tv-buscar').addEventListener('click',function(){ leer(); cargarTV(); });
    document.getElementById('tv-q').addEventListener('keydown',function(e){ if(e.key==='Enter'){ leer(); cargarTV(); } });
    document.getElementById('tv-nueva').addEventListener('click',function(){ fichaTV(null); });
    Promise.all([ sbCount('cuentas_tv?estado=eq.DISPONIBLE&select=id'), sbCount('cuentas_tv?estado=eq.EN_USO&select=id'), sbCount('cuentas_tv?estado=eq.BAJA_PENDIENTE&select=id'), sbCount('cuentas_tv?select=id') ]).then(function(c){
      var k=document.getElementById('tv-kpis'); if(k) k.innerHTML=kpi(c[0],'Disponibles','g')+kpi(c[1],'En uso','b')+kpi(c[2],'A cambiar clave','w')+kpi(c[3],'Total','');
    });
    cargarTV();
  }
  function cargarTV(){
    var cont=document.getElementById('tv-tabla'); if(!cont) return; cont.innerHTML='<div class="center"><div class="spin"></div></div>';
    var p='cuentas_tv?select=*,clientes(numero_cliente,nombre,apellido)&order=mail&limit=1000';
    if(tvState.estado) p+='&estado=eq.'+tvState.estado;
    if(tvState.q){ var q=tvState.q.replace(/[(),]/g,' '); p+='&or=(usuario.ilike.*'+q+'*,mail.ilike.*'+q+'*,abonado_numero.ilike.*'+q+'*,cic.ilike.*'+q+'*)'; }
    sbGet(p).then(function(d){ d=Array.isArray(d)?d:[];
      if(!d.length){ cont.innerHTML='<div class="center">Sin cuentas.</div>'; return; }
      var h='<table><thead><tr><th>Usuario</th><th>Mail</th><th>Fútbol</th><th>Cliente Nexa</th><th>Estado</th></tr></thead><tbody>';
      d.forEach(function(t){ var cl;
        if(t.clientes) cl='N°'+t.clientes.numero_cliente+' '+esc(t.clientes.nombre||'');
        else if(t.nro_isp) cl='<span class="muted">ISP '+esc(t.nro_isp)+' · sin vincular</span>';
        else cl='<span class="muted">—</span>';
        h+='<tr data-id="'+t.id+'" style="cursor:pointer"><td style="font-family:monospace;font-size:12px"><b>'+esc(t.usuario||'—')+'</b></td><td>'+esc(t.mail||'')+'</td><td>'+(t.pack_futbol?'⚽':'—')+'</td><td>'+cl+'</td><td>'+tvPill(t.estado)+'</td></tr>'; });
      h+='</tbody></table><div class="muted" style="margin-top:8px">'+d.length+' cuentas</div>'; cont.innerHTML=h;
      Array.prototype.forEach.call(cont.querySelectorAll('tr[data-id]'),function(tr){ tr.addEventListener('click',function(){ fichaTV(d.filter(function(x){return x.id==tr.getAttribute('data-id');})[0]); }); });
    });
  }
  function genPin6(){ var s=''; for(var i=0;i<6;i++) s+=Math.floor(Math.random()*10); return s; }
  function fichaTV(t){
    t=t||{};
    // cliente vinculado (resuelto por nro_isp = numero_cliente); arranca con el que ya tiene
    var linkedCli=t.clientes?{ id:t.cliente_id, numero_cliente:t.clientes.numero_cliente, nombre:t.clientes.nombre, apellido:t.clientes.apellido }:null;
    modal('<h2>'+(t.id?'Cuenta TV':'Nueva cuenta TV')+'</h2>'
      +'<div class="row"><div><label class="l">Usuario</label><input id="tv-usuario" value="'+esc(t.usuario||'')+'"></div>'
      +'<div><label class="l">Contraseña</label><div style="display:flex;gap:6px"><input id="tv-pass" value="'+esc(t.contrasena||'')+'" style="flex:1"><button type="button" class="btn btn-2" id="tv-genpass" title="Generar clave de 6 dígitos" style="white-space:nowrap">🎲 Generar</button></div></div></div>'
      +'<label class="l">Mail</label><input id="tv-mail" value="'+esc(t.mail||'')+'">'
      +'<label class="l">N° cliente Nexa/ISP (nuestro)</label><input id="tv-nroisp" value="'+esc(t.nro_isp||'')+'" placeholder="ej 6035">'
      +'<div id="tv-cli-status" style="font-size:13px;margin:4px 0 8px"></div>'
      +'<div class="row"><div><label class="l">Abonado Gigared</label><input id="tv-abon" value="'+esc(t.abonado_numero||'')+'" placeholder="dato de Gigared"></div><div><label class="l">CIC</label><input id="tv-cic" value="'+esc(t.cic||'')+'"></div></div>'
      +'<div style="display:flex;gap:18px;margin-top:10px"><label style="font-weight:600"><input type="checkbox" id="tv-fut"'+(t.pack_futbol?' checked':'')+'> Pack Fútbol</label><label style="font-weight:600"><input type="checkbox" id="tv-isp"'+(t.cargado_isp?' checked':'')+'> Cargada en ISP</label></div>'
      +'<label class="l">Estado</label><select id="tv-estado-e">'+opt(['DISPONIBLE','EN_USO','BAJA_PENDIENTE'],t.estado||'DISPONIBLE')+'</select>'
      +(t.id&&t.estado==='BAJA_PENDIENTE'?'<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;padding:8px 10px;margin-top:10px;font-size:13px">⚠️ Cambiá la clave en Gigared para que el cliente anterior no pueda ingresar. Cuando lo hagas, marcá "Clave cambiada".</div>':'')
      +'<label class="l">Notas</label><textarea id="tv-notas">'+esc(t.notas||'')+'</textarea>'
      +'<div id="tv-err" style="color:var(--rojo);font-size:13px;min-height:16px;margin-top:8px"></div>'
      +'<div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="btn btn-ok" id="tv-save">Guardar</button>'
      +(t.id&&t.estado==='EN_USO'?'<button class="btn btn-2" id="tv-baja">↩️ Dar de baja TV</button>':'')
      +(t.id&&t.estado==='BAJA_PENDIENTE'?'<button class="btn btn-ok" id="tv-lista">✓ Clave cambiada en Gigared → Disponible</button>':'')
      +'<button class="btn btn-2" id="tv-x">Cerrar</button></div>');
    function resolveCli(){
      var v=document.getElementById('tv-nroisp').value.trim(), box=document.getElementById('tv-cli-status');
      if(!v){ linkedCli=null; box.innerHTML='<span class="muted">Sin vincular a cliente nuestro.</span>'; return; }
      if(!/^\d+$/.test(v)){ linkedCli=null; box.innerHTML='<span style="color:var(--rojo)">No es un N° de cliente válido (solo números).</span>'; return; }
      box.innerHTML='<span class="muted">Buscando cliente…</span>';
      sbGet('clientes?select=id,numero_cliente,nombre,apellido,tv_online&numero_cliente=eq.'+v+'&limit=1').then(function(d){
        if(Array.isArray(d)&&d.length){ var c=d[0]; linkedCli=c;
          box.innerHTML='✅ Vincula a <b>'+esc(c.nombre||'')+' '+esc(c.apellido||'')+'</b> (N°'+c.numero_cliente+') · '+(c.tv_online?'<span style="color:#15803d">TV marcado en su ficha</span>':'<span style="color:#b45309">TV NO marcado en su ficha</span>');
        } else { linkedCli=null; box.innerHTML='<span style="color:var(--rojo)">No existe cliente N°'+esc(v)+' en la base.</span>'; }
      }).catch(function(){ box.innerHTML='<span style="color:var(--rojo)">Error al buscar.</span>'; });
    }
    document.getElementById('tv-nroisp').addEventListener('blur',resolveCli);
    resolveCli();
    document.getElementById('tv-genpass').addEventListener('click',function(){ document.getElementById('tv-pass').value=genPin6(); });
    document.getElementById('tv-x').addEventListener('click',cerrarModal);
    document.getElementById('tv-save').addEventListener('click',function(){
      var body={ usuario:document.getElementById('tv-usuario').value.trim()||null, contrasena:document.getElementById('tv-pass').value.trim()||null, mail:document.getElementById('tv-mail').value.trim()||null, nro_isp:document.getElementById('tv-nroisp').value.trim()||null, abonado_numero:document.getElementById('tv-abon').value.trim()||null, cic:document.getElementById('tv-cic').value.trim()||null, pack_futbol:document.getElementById('tv-fut').checked, cargado_isp:document.getElementById('tv-isp').checked, estado:document.getElementById('tv-estado-e').value, notas:document.getElementById('tv-notas').value.trim()||null, cliente_id:linkedCli?linkedCli.id:null };
      var btn=this; btn.disabled=true;
      var prom=t.id? sbPatch('cuentas_tv?id=eq.'+t.id,body) : sbPost('cuentas_tv',body);
      prom.then(function(r){ if(!t.id&&(!Array.isArray(r)||!r.length)) throw 0; cerrarModal(); toast('Cuenta guardada ✓'); vCuentasTV(); }).catch(function(){ document.getElementById('tv-err').textContent='No se pudo guardar.'; btn.disabled=false; });
    });
    var bj=document.getElementById('tv-baja'); if(bj) bj.addEventListener('click',function(){ sbPatch('cuentas_tv?id=eq.'+t.id,{estado:'BAJA_PENDIENTE',fecha_baja:new Date().toISOString().substring(0,10)}).then(function(){ cerrarModal(); toast('Cuenta en baja · cambiá la clave en Gigared'); vCuentasTV(); }); });
    var li=document.getElementById('tv-lista'); if(li) li.addEventListener('click',function(){ sbPatch('cuentas_tv?id=eq.'+t.id,{estado:'DISPONIBLE',cliente_id:null,fecha_baja:null}).then(function(){ cerrarModal(); toast('Cuenta liberada ✓ → Disponible'); vCuentasTV(); }); });
  }

  // ── util UI ──
  function opt(arr,sel){ return arr.map(function(x){return '<option'+(x===sel?' selected':'')+'>'+esc(x)+'</option>';}).join(''); }
  function modal(html,cls){ var d=document.createElement('div'); d.className='ov'; d.id='ov'; d.innerHTML='<div class="modal '+(cls||'')+'">'+html+'</div>'; d.addEventListener('click',function(e){ if(e.target===d)cerrarModal(); }); document.body.appendChild(d); }
  function cerrarModal(){ var o=document.getElementById('ov'); if(o)o.remove(); }

  document.getElementById('lg-btn').addEventListener('click',login);
  document.getElementById('lg-pin').addEventListener('keydown',function(e){ if(e.key==='Enter')login(); });
  // restaurar sesión: no desconectar al refrescar (vence a las 24 h)
  try{ var _s=JSON.parse(localStorage.getItem('nexa_sesion')||'null'); if(_s && _s.u && (Date.now()-_s.t < 86400000)){ USER=_s.u; iniciar(); } }catch(e){}
})();
</script>
</body>
