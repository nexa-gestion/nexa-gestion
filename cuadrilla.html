<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#1e3a5f">
<title>Nexa · Técnico — v0.32</title>
<style>
  :root{ --azul:#1e3a5f; --azul2:#2563eb; --bg:#f1f5f9; --tinta:#0f172a; --gris:#64748b; --bord:#e2e8f0;
    --verde:#16a34a; --ambar:#d97706; --rojo:#dc2626; --cyan:#0891b2; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--tinta);font-size:16px}
  #app{max-width:560px;margin:0 auto;min-height:100vh}
  .top{position:sticky;top:0;z-index:10;background:var(--azul);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
  .top .t{font-weight:700;font-size:17px}
  .top .s{font-size:12px;opacity:.8}
  .top a{color:#fff;font-size:13px;text-decoration:underline;opacity:.9}
  .wrap{padding:14px}
  .card{background:#fff;border:1px solid var(--bord);border-radius:14px;padding:14px;margin-bottom:12px}
  .label{font-weight:700;font-size:13px;color:var(--gris);margin:10px 0 5px;text-transform:uppercase;letter-spacing:.3px}
  input,select{width:100%;border:2px solid var(--bord);border-radius:12px;padding:13px;font-size:16px;font-family:inherit;background:#fff}
  input:focus,select:focus{outline:none;border-color:var(--azul2)}
  .btn{display:block;width:100%;border:0;border-radius:12px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none}
  .btn-pri{background:var(--azul2);color:#fff}
  .btn-ok{background:var(--verde);color:#fff}
  .btn-2{background:#fff;color:var(--azul2);border:2px solid var(--azul2)}
  .btn-sm{display:inline-block;width:auto;padding:9px 14px;font-size:14px;border-radius:10px}
  .row2{display:flex;gap:8px}
  .row2>*{flex:1}
  .ot{background:#fff;border:1px solid var(--bord);border-radius:14px;padding:13px;margin-bottom:11px}
  .ot .h{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .ot .num{font-weight:800;font-size:16px}
  .ot .cli{font-weight:600;margin-top:3px}
  .ot .dir{color:var(--gris);font-size:14px;margin-top:2px}
  .ot .acc{display:flex;gap:8px;margin-top:11px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .p-pend{background:#fef9c3;color:#854d0e}
  .p-asig{background:#dbeafe;color:#1e40af}
  .p-curso{background:#e0e7ff;color:#3730a3}
  .p-cerr{background:#cffafe;color:#155e75}
  .badge-tt{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#f1f5f9;color:#475569;margin-top:6px}
  .tabs{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto}
  .tabs button{flex:0 0 auto;border:1px solid var(--bord);background:#fff;border-radius:20px;padding:8px 14px;font-size:14px;font-weight:600;color:var(--gris)}
  .tabs button.on{background:var(--azul2);color:#fff;border-color:var(--azul2)}
  .center{text-align:center;padding:30px;color:var(--gris)}
  .spin{width:30px;height:30px;border:3px solid var(--bord);border-top-color:var(--azul2);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .err{color:var(--rojo);font-size:14px;min-height:18px;margin:8px 0}
  .logo{font-size:34px;font-weight:800;color:var(--azul2);text-align:center;letter-spacing:2px;margin-top:30px}
  .sublogo{text-align:center;color:var(--gris);margin-bottom:18px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 18px;border-radius:12px;font-size:14px;opacity:0;transition:.2s;z-index:99;max-width:90%}
  .toast.show{opacity:.95}
  .muted{color:var(--gris);font-size:13px}
  .menu-ov{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:50;display:flex;justify-content:flex-end;align-items:flex-start}
  .menu-card{background:#fff;margin:54px 10px 0 0;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.25);overflow:hidden;min-width:210px}
  .menu-card a{display:block;padding:15px 18px;border-bottom:1px solid var(--bord);font-weight:600;color:var(--tinta);cursor:pointer}
  .menu-card a:last-child{border-bottom:0}
</style>
</head>
<body>
<div id="app"><div class="center"><div class="spin"></div></div></div>
<div class="toast" id="toast"></div>
<script>
  var SB_URL='https://xlfntplfhdjoqrofhcwe.supabase.co';
  var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhsZm50cGxmaGRqb3Fyb2ZoY3dlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTIyMjEsImV4cCI6MjA5NjUyODIyMX0.7uqzHQyrir23uCQ_GUabvX5kavr3VC_6UzaOizdZJI4';
  var VER='v0.32';
  var H={ 'apikey':SB_KEY, 'Authorization':'Bearer '+SB_KEY };
  var app=document.getElementById('app');
  var CUAD=null, listState={ filtro:'activas' };

  function sbGet(p){ return fetch(SB_URL+'/rest/v1/'+p,{headers:H}).then(function(r){return r.json();}); }
  function sbPost(p,b){ return fetch(SB_URL+'/rest/v1/'+p,{method:'POST',headers:Object.assign({},H,{'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(b)}).then(function(r){return r.json();}); }
  function sbPatch(p,b){ return fetch(SB_URL+'/rest/v1/'+p,{method:'PATCH',headers:Object.assign({},H,{'Content-Type':'application/json','Prefer':'return=representation'}),body:JSON.stringify(b)}).then(function(r){return r.json();}); }
  function getGPS(){ return new Promise(function(res){ if(!navigator.geolocation){res(null);return;} navigator.geolocation.getCurrentPosition(function(p){res({lat:+p.coords.latitude.toFixed(6),lng:+p.coords.longitude.toFixed(6)});},function(){res(null);},{enableHighAccuracy:true,timeout:20000,maximumAge:30000}); }); }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function toast(m){ var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2400); }
  function fmtFecha(v){ if(!v) return '—'; var s=String(v).substring(0,10), p=s.split('-'); return p.length===3?(p[2]+'-'+p[1]+'-'+p[0]):s; }
  function _hoyISO(){ var d=new Date(); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  function _addDias(iso,n){ var p=String(iso).split('-'),d=new Date(+p[0],+p[1]-1,+p[2]); d.setDate(d.getDate()+n); return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); }
  function _diaTitulo(iso){ if(!iso) return '📌 Sin fecha'; var hoy=_hoyISO(); if(iso===hoy) return '📆 Hoy'; if(iso===_addDias(hoy,1)) return '📆 Mañana'; var p=iso.split('-'),d=new Date(+p[0],+p[1]-1,+p[2]); var t=d.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}); return '📆 '+t.charAt(0).toUpperCase()+t.slice(1); }

  // ── sesión ──
  function getSesion(){ try{ return JSON.parse(sessionStorage.getItem('nexa_tec')||'null'); }catch(e){ return null; } }
  function setSesion(c){ sessionStorage.setItem('nexa_tec', JSON.stringify(c)); }
  function salir(){ sessionStorage.removeItem('nexa_tec'); CUAD=null; vLogin(); }

  // ── arranque ──
  function iniciar(){ var s=getSesion(); if(s&&s.id){ CUAD=s; vLista(); } else vLogin(); }

  // ── LOGIN ──
  function vLogin(){
    app.innerHTML='<div class="wrap"><div class="logo">NEXA</div><div class="sublogo">App del técnico</div>'
      +'<div class="card"><div class="label">Cuadrilla</div><select id="lg-cuad"><option>Cargando…</option></select>'
      +'<div class="label">PIN</div><input id="lg-pin" type="tel" inputmode="numeric" placeholder="••••" maxlength="8">'
      +'<div class="err" id="lg-err"></div>'
      +'<button class="btn btn-pri" id="lg-entrar" style="margin-top:6px">Entrar</button></div>'
      +'<div class="muted" style="text-align:center">Nexa · '+VER+'</div></div>';
    sbGet('cuadrillas?select=id,nombre,pin_pwa&activa=eq.true&order=nombre').then(function(d){
      d=Array.isArray(d)?d:[]; var sel=document.getElementById('lg-cuad');
      if(!d.length){ sel.innerHTML='<option value="">No hay cuadrillas</option>'; return; }
      sel.innerHTML=d.map(function(c){return '<option value="'+c.id+'">'+esc(c.nombre)+'</option>';}).join('');
      window._CUADS=d;
    });
    document.getElementById('lg-entrar').addEventListener('click',function(){
      var id=document.getElementById('lg-cuad').value, pin=document.getElementById('lg-pin').value.trim(), err=document.getElementById('lg-err');
      var c=(window._CUADS||[]).filter(function(x){return String(x.id)===String(id);})[0];
      if(!c){ err.textContent='Elegí tu cuadrilla.'; return; }
      if(!c.pin_pwa){ err.textContent='Esta cuadrilla no tiene PIN configurado. Pedíselo al admin.'; return; }
      if(pin!==String(c.pin_pwa)){ err.textContent='PIN incorrecto.'; return; }
      CUAD={ id:c.id, nombre:c.nombre }; setSesion(CUAD); vLista();
    });
    document.getElementById('lg-pin').addEventListener('keydown',function(e){ if(e.key==='Enter') document.getElementById('lg-entrar').click(); });
  }

  // ── LISTA DE OTs ──
  function topBar(titulo, sub){
    return '<div class="top"><div><div class="t">'+esc(titulo)+'</div><div class="s">'+(sub?esc(sub)+' · ':'')+VER+'</div></div><a id="top-menu" style="font-size:22px">☰</a></div>'
      +'<div id="menu-ov" class="menu-ov" style="display:none"><div class="menu-card">'
      +'<a data-m="lista">📋 Mis órdenes</a><a data-m="buscar">🔎 Buscar cliente</a><a data-m="descon">🔌 Desconexiones</a><a data-m="salir">🚪 Salir</a>'
      +'</div></div>';
  }
  function wireTop(){
    var m=document.getElementById('top-menu'); if(m) m.addEventListener('click',function(){ var o=document.getElementById('menu-ov'); o.style.display=(o.style.display==='none'?'flex':'none'); });
    var ov=document.getElementById('menu-ov'); if(ov){
      ov.addEventListener('click',function(e){ if(e.target===ov) ov.style.display='none'; });
      Array.prototype.forEach.call(ov.querySelectorAll('[data-m]'),function(a){ a.addEventListener('click',function(){ ov.style.display='none'; var v=a.getAttribute('data-m'); ({lista:vLista,buscar:vBuscar,descon:vDescon,salir:salir}[v]||vLista)(); }); });
    }
  }
  function waNum(t){ var d=String(t||'').replace(/\D/g,''); if(d.length===10) d='549'+d; else if(d.length===11&&d.charAt(0)==='0') d='549'+d.slice(1); return d; }
  function haversine(la1,lo1,la2,lo2){ var R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180,a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)*Math.sin(dLo/2); return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); }
  function pillCli(e){ var m={activo:'p-curso',bloqueado:'p-pend',baja:'p-cerr',prospecto:'p-asig'}; return '<span class="pill '+(m[e]||'p-pend')+'">'+esc(e||'—')+'</span>'; }
  var ESTADOS_ACT=['PENDIENTE','ASIGNADA','EN_CURSO'];
  function vLista(){
    app.innerHTML=topBar('Mis órdenes', CUAD.nombre)+'<div class="wrap">'
      +'<div class="tabs" id="ls-tabs">'
      +[['activas','Por hacer'],['curso','En curso'],['cerradas','Cerradas']].map(function(t){return '<button data-f="'+t[0]+'" class="'+(listState.filtro===t[0]?'on':'')+'">'+t[1]+'</button>';}).join('')
      +'</div><div id="ls-cont"><div class="center"><div class="spin"></div></div></div></div>';
    wireTop();
    Array.prototype.forEach.call(document.querySelectorAll('#ls-tabs [data-f]'),function(b){ b.addEventListener('click',function(){ listState.filtro=b.getAttribute('data-f'); vLista(); }); });
    cargarOTs();
  }
  function cargarOTs(){
    var cont=document.getElementById('ls-cont');
    var estadoQ;
    if(listState.filtro==='curso') estadoQ='estado=eq.EN_CURSO';
    else if(listState.filtro==='cerradas') estadoQ='estado=in.(CERRADA_TECNICO,FINALIZADA)';
    else estadoQ='estado=in.(PENDIENTE,ASIGNADA,EN_CURSO,PARCIAL)';
    var agrupa=(listState.filtro==='activas');
    var orden=agrupa?'order=fecha_agendada.asc.nullslast,created_at.asc':'order=created_at.asc';
    var p='ordenes_trabajo?select=id,numero,tipo,area,titulo,parcial,estado,prioridad,descripcion,fecha_agendada,clientes(numero_cliente,codigo_ispcube,nombre,apellido,domicilio_full,telefono,lat,lng,geo_origen,caja_nap,puerto,precinto,portal_password),clientes_servicios(nombre,direccion,telefono,contacto),tipos_trabajo(nombre),motivos_ot(nombre)&cuadrilla_id=eq.'+CUAD.id+'&'+estadoQ+'&'+orden;
    sbGet(p).then(function(d){ d=Array.isArray(d)?d:[];
      if(!d.length){ cont.innerHTML='<div class="center">No hay órdenes acá. 👍</div>'; return; }
      function cardOT(o){
        if(o.area==='SERVICIOS') return cardServ(o);
        var cli=o.clientes, nom=cli?((cli.nombre||'')+' '+(cli.apellido||'')).trim():'(obra de red, sin cliente)';
        var dir=cli&&cli.domicilio_full?esc(cli.domicilio_full):'';
        var irBtn = (cli&&(cli.lat!=null||cli.domicilio_full)) ? '<a class="btn btn-2 btn-sm" target="_blank" href="'+mapsUrl(cli)+'">🚗 Ir</a>' : '';
        return '<div class="ot"><div class="h"><div><span class="num">N° '+esc(o.numero)+'</span> · '+esc(o.tipo)+'</div>'+pillEstado(o.estado)+'</div>'
          +'<div class="cli">'+esc(nom)+'</div>'+(dir?'<div class="dir">📍 '+dir+'</div>':'')
          +(cli&&cli.telefono?'<div class="dir">📞 '+esc(cli.telefono)+'</div>':'')
          +(o.tipos_trabajo?'<span class="badge-tt">'+esc(o.tipos_trabajo.nombre)+'</span>':'')
          +(o.motivos_ot?' <span class="badge-tt">'+esc(o.motivos_ot.nombre)+'</span>':'')
          +(o.descripcion?'<div class="dir" style="margin-top:6px">'+esc(o.descripcion)+'</div>':'')
          +'<div class="acc">'+irBtn
          +(cli&&cli.telefono?'<a class="btn btn-2 btn-sm" href="tel:'+esc(String(cli.telefono).replace(/[^\d+]/g,''))+'">📞 Llamar</a><a class="btn btn-2 btn-sm" target="_blank" href="https://wa.me/'+waNum(cli.telefono)+'">💬</a>':'')
          +'<button class="btn btn-pri btn-sm ot-abrir" data-id="'+o.id+'">Abrir</button></div></div>';
      }
      if(agrupa){
        // agrupar por fecha coordinada: Hoy, Mañana, días siguientes, y Sin fecha al final
        var grupos=[], idx={};
        d.forEach(function(o){ var k=o.fecha_agendada?String(o.fecha_agendada).substring(0,10):'__nofecha'; if(idx[k]==null){ idx[k]=grupos.length; grupos.push({k:k,ots:[]}); } grupos[idx[k]].ots.push(o); });
        grupos.sort(function(a,b){ if(a.k==='__nofecha')return 1; if(b.k==='__nofecha')return -1; return a.k<b.k?-1:(a.k>b.k?1:0); });
        var hoy=_hoyISO();
        cont.innerHTML=grupos.map(function(g){ var es=(g.k!=='__nofecha'&&g.k===hoy); var tit=_diaTitulo(g.k==='__nofecha'?null:g.k);
          return '<div class="diah" style="font-weight:800;font-size:14px;color:'+(es?'#0f6e56':'#334155')+';margin:14px 2px 6px;display:flex;align-items:center;gap:8px">'+esc(tit)+' <span style="font-weight:600;color:#94a3b8;font-size:12px">('+g.ots.length+')</span></div>'
            +g.ots.map(cardOT).join('');
        }).join('');
      } else {
        cont.innerHTML=d.map(cardOT).join('');
      }
      Array.prototype.forEach.call(cont.querySelectorAll('.ot-abrir'),function(b){ b.addEventListener('click',function(){ vDetalle(d.filter(function(x){return x.id==b.getAttribute('data-id');})[0]); }); });
    }).catch(function(){ cont.innerHTML='<div class="center">Error al cargar. Reintentá.</div>'; });
  }
  function pillEstado(e){ var m={PENDIENTE:'p-pend',ASIGNADA:'p-asig',EN_CURSO:'p-curso',PARCIAL:'p-curso',CERRADA_TECNICO:'p-cerr',FINALIZADA:'p-cerr'}; return '<span class="pill '+(m[e]||'p-pend')+'">'+esc((e==='PARCIAL'?'parcial (sigue)':(e||'').replace('_',' ').toLowerCase()))+'</span>'; }
  function _hm(ms){ if(!ms||ms<0)return '0m'; var min=Math.round(ms/60000),h=Math.floor(min/60),m=min%60; return (h?h+'h ':'')+m+'m'; }
  function _hhmm(iso){ if(!iso)return '--:--'; var d=new Date(iso); if(isNaN(d))return '--:--'; var p=function(n){return (n<10?'0':'')+n;}; return p(d.getHours())+':'+p(d.getMinutes()); }
  function mapsUrl(cli){ var q = (cli.lat!=null&&cli.lng!=null) ? (cli.lat+','+cli.lng) : (cli.domicilio_full||''); return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q); }

  // ── DETALLE OT (cierre = próxima tanda) ──
  function vDetalle(o){
    if(o.area==='SERVICIOS'){ vDetalleServ(o); return; }
    var cli=o.clientes||{}; var nom=((cli.nombre||'')+' '+(cli.apellido||'')).trim()||'(obra de red)';
    app.innerHTML=topBar('OT N° '+o.numero, o.tipo)+'<div class="wrap">'
      +'<div class="card"><div style="margin-bottom:8px">'+pillEstado(o.estado)+' · prioridad '+esc(o.prioridad||'NORMAL')+'</div>'
      +fila('Cliente',nom)
      +(cli.numero_cliente?fila('N° Cliente Nexa',cli.numero_cliente):'')
      +fila('N° Cliente ISP',cli.codigo_ispcube||'— (todavía sin cargar en ISP)')
      +(cli.domicilio_full?fila('Domicilio',cli.domicilio_full):'')
      +(cli.telefono?fila('Teléfono',cli.telefono):'')
      +(cli.caja_nap?fila('Caja (NAP)',cli.caja_nap):'')
      +(cli.puerto?fila('Puerto de fibra',cli.puerto):'')
      +(cli.precinto?fila('Precinto',cli.precinto):'')
      +(cli.portal_password?fila('🔑 Clave del portal',cli.portal_password):'')
      +(o.tipos_trabajo?fila('Tipo de trabajo',o.tipos_trabajo.nombre):'')
      +(o.motivos_ot?fila('Motivo',o.motivos_ot.nombre):'')
      +(o.descripcion?fila('Descripción',o.descripcion):'')
      +(o.fecha_agendada?fila('Agendada',fmtFecha(o.fecha_agendada)):'')
      +'</div>'
      +(function(){ var gps=(cli.lat!=null&&cli.lng!=null), medida=(cli.geo_origen==='TECNICO'), h='';
          if(gps) h+='<a class="btn btn-pri" target="_blank" href="https://www.google.com/maps/search/?api=1&query='+cli.lat+','+cli.lng+'" style="margin-bottom:8px">🛰️ '+(medida?'Ir al GPS de la última visita':'Ir a la ubicación (aprox.)')+'</a>';
          if(cli.domicilio_full) h+='<a class="btn btn-2" target="_blank" href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(cli.domicilio_full+(cli.barrio?(' '+cli.barrio):''))+'" style="margin-bottom:10px">🏠 Ir por la dirección</a>';
          return h; })()
      +(cli.telefono?'<div class="row2" style="margin-bottom:10px"><a class="btn btn-2" href="tel:'+esc(String(cli.telefono).replace(/[^\d+]/g,''))+'">📞 Llamar</a><a class="btn btn-2" target="_blank" href="https://wa.me/'+waNum(cli.telefono)+'">💬 WhatsApp</a></div>':'')
      +(o.estado==='EN_CURSO' ? '' : '<button class="btn btn-pri" id="dt-iniciar" style="margin-bottom:10px">▶ Iniciar tarea</button>')
      +(o.estado==='CERRADA_TECNICO'||o.estado==='FINALIZADA' ? '<div class="card" style="text-align:center;color:var(--cyan)">✅ Tarea cerrada por el técnico</div>' : '<button class="btn btn-ok" id="dt-cerrar">✅ Cerrar tarea</button>')
      +(o.estado==='CERRADA_TECNICO'||o.estado==='FINALIZADA' ? '' : '<button class="btn" id="dt-rechazar" style="background:var(--rojo);color:#fff;margin-top:10px">✕ Rechazar (no se pudo hacer)</button>')
      +'<button class="btn btn-2" id="dt-volver" style="margin-top:10px">← Volver</button>'
      +'</div>';
    wireTop();
    document.getElementById('dt-volver').addEventListener('click',vLista);
    var ini=document.getElementById('dt-iniciar'); if(ini) ini.addEventListener('click',function(){ iniciarTarea(o); });
    var cer=document.getElementById('dt-cerrar'); if(cer) cer.addEventListener('click',function(){ abrirCierre(o); });
    var rch=document.getElementById('dt-rechazar'); if(rch) rch.addEventListener('click',function(){ abrirCierre(o,true); });
  }
  function fila(k,v){ return '<div style="display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--bord)"><span class="muted">'+esc(k)+'</span><span style="font-weight:600;text-align:right">'+esc(v)+'</span></div>'; }

  // ════════ CIERRE DE TAREA (calco adaptado de FG) ════════

  function _cieBkey(){ return (CIE&&CIE.o)?('nexa_cie_'+CIE.o.id):null; }
  function _cieGuardar(){
    if(!CIE||!CIE.o||CIE.modoRechazo) return;   // los rechazos son rápidos, no se persisten
    try{ localStorage.setItem(_cieBkey(), JSON.stringify({ accion:CIE.accion, ttId:CIE.ttId, mats:CIE.mats, mos:CIE.mos, datos:CIE.datos,
      fotos:(CIE.fotos||[]).filter(function(f){return f.url;}).map(function(f){return {url:f.url,preview:f.url}; }), t:Date.now() })); }catch(e){}
  }
  function _cieBorrar(){ try{ var k=_cieBkey(); if(k) localStorage.removeItem(k); }catch(e){} }
  function _cieRestaurar(){
    try{ var k=_cieBkey(), raw=k&&localStorage.getItem(k); if(!raw) return false;
      var b=JSON.parse(raw); if(!b||(b.t&&Date.now()-b.t>86400000)){ _cieBorrar(); return false; }
      if(b.accion) CIE.accion=b.accion;
      if(b.ttId) CIE.ttId=b.ttId;
      if(b.mats&&Object.keys(b.mats).length) CIE.mats=b.mats;
      if(b.mos&&Object.keys(b.mos).length) CIE.mos=b.mos;
      if(b.datos) CIE.datos=b.datos;

  // Trae materiales + mano de obra del tipo de trabajo elegido y re-renderiza (el técnico elige primero, después aparece el kit)

        +'<div class="card"><div class="label">Fotos</div><div id="cie-fotos">'+renderFotos()+'</div><input type="file" accept="image/*" multiple id="cie-foto-in" style="margin-top:8px;border:0;padding:6px 0"></div>'

  function each(sel,fn){ Array.prototype.forEach.call(document.querySelectorAll(sel),fn); }
  function wireCierre(){
    wireTop();
    document.getElementById('cie-volver').addEventListener('click',function(){ vDetalle(CIE.o); });
    var asi=document.getElementById('ac-si'), ano=document.getElementById('ac-no');
    if(asi) asi.addEventListener('click',function(){ CIE.accion='REALIZADA'; renderCierre(); });
    if(ano) ano.addEventListener('click',function(){ CIE.accion='NO_REALIZADA'; renderCierre(); });
    var ctt=document.getElementById('cie-tt'); if(ctt) ctt.addEventListener('change',function(){ CIE.ttId=ctt.value?Number(ctt.value):null; CIE.mats={}; CIE.mos={}; cieCargarKit(); });
    // Cantidad editable (se escribe directo, arranca vacío) — guarda sin re-renderizar para no perder el foco
    each('.mat-cant',function(inp){ inp.oninput=function(){ cieMat(inp.getAttribute('data-m')).cant=Math.max(0,parseInt(inp.value,10)||0); _cieGuardar(); }; });
    each('.mo-cant',function(inp){ inp.oninput=function(){ CIE.mos[inp.getAttribute('data-m')]=Math.max(0,parseInt(inp.value,10)||0); _cieGuardar(); }; });
    // Serial: tildar/destildar (sin tope) o escanear/escribir; la cantidad la dan los seriales elegidos
    each('.ser-chip',function(b){ b.onclick=function(){ var s=cieMat(b.getAttribute('data-m')),v=b.getAttribute('data-s'),i=s.sel.indexOf(v); if(i>=0)s.sel.splice(i,1); else s.sel.push(v); renderCierre(); }; });
    each('.ser-man',function(inp){ var add=function(){ var s=cieMat(inp.getAttribute('data-m')),v=(inp.value||'').trim().toUpperCase().replace(/[:\-.\s]/g,''); if(v&&s.sel.indexOf(v)<0){ s.sel.push(v); renderCierre(); } }; inp.onchange=add; inp.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); add(); } }; });
    each('.ser-scan',function(b){ b.onclick=function(){ _scanSerial(b.getAttribute('data-m')); }; });
    each('.cie-dato',function(inp){ inp.oninput=function(){ if(!CIE.datos)CIE.datos={}; CIE.datos[inp.getAttribute('data-k')]=inp.value; _cieGuardar(); }; });

  function comprimir(file){ return new Promise(function(res){ var img=new Image(); img.onload=function(){ var c=document.createElement('canvas'),mx=1280,w=img.width,hh=img.height; if(w>hh&&w>mx){hh=hh*mx/w;w=mx;} else if(hh>mx){w=w*mx/hh;hh=mx;} c.width=w;c.height=hh; c.getContext('2d').drawImage(img,0,0,w,hh); c.toBlob(function(b){res(b);},'image/jpeg',0.7); }; img.src=URL.createObjectURL(file); }); }
  function subirFotos(files){
    Array.prototype.forEach.call(files,function(file){
      comprimir(file).then(function(blob){
        var f={ preview:URL.createObjectURL(blob), url:null }; CIE.fotos.push(f); renderCierre();
        var nombre=CIE.o.id+'/'+Date.now()+'_'+Math.floor(Math.random()*1000)+'.jpg';
        fetch(SB_URL+'/storage/v1/object/ot-fotos/'+nombre,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob})
          .then(function(r){ if(!r.ok) throw 0; f.url=SB_URL+'/storage/v1/object/public/ot-fotos/'+nombre; renderCierre(); })
          .catch(function(){ toast('No se pudo subir una foto (¿falta el bucket ot-fotos?)'); });
      });
    });
  }
  // Escanear serial/MAC con la cámara (código de barras o QR). Requiere Chrome en Android (BarcodeDetector).
  function _scanSerial(matId){
    if(!('BarcodeDetector' in window) || !navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      toast('Tu celular no soporta el escáner. Escribí el serial a mano (anda con Chrome en Android).'); return;
    }
    var ov=document.createElement('div');
    ov.style.cssText='position:fixed;inset:0;background:#000;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px';
    ov.innerHTML='<video id="scan-vid" playsinline muted style="max-width:100%;max-height:74vh;border-radius:12px;border:2px solid #fff"></video>'
      +'<div style="color:#fff;margin-top:12px;font-size:14px;text-align:center">📷 Apuntá al código de barras o QR del equipo</div>'
      +'<button id="scan-x" class="btn btn-2" style="margin-top:16px;width:auto;padding:11px 24px">Cancelar</button>';
    document.body.appendChild(ov);
    var vid=ov.querySelector('#scan-vid'), stream=null, stop=false;
    var det=new BarcodeDetector({formats:['code_128','code_39','ean_13','ean_8','codabar','itf','qr_code','data_matrix','upc_a','upc_e']});
    function cerrar(){ stop=true; try{ if(stream) stream.getTracks().forEach(function(t){t.stop();}); }catch(e){} try{ ov.remove(); }catch(e){} }
    ov.querySelector('#scan-x').addEventListener('click',cerrar);
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(s){
      stream=s; vid.srcObject=s; vid.play();
      (function loop(){
        if(stop) return;
        det.detect(vid).then(function(codes){
          if(stop) return;
          if(codes&&codes.length){
            var val=(codes[0].rawValue||'').trim().toUpperCase().replace(/[:\-.\s]/g,'');
            if(val){ var st=cieMat(matId); if(st.sel.indexOf(val)<0){ st.sel.push(val); } cerrar(); renderCierre(); toast('Serial escaneado: '+val); return; }
          }
          setTimeout(loop,250);
        }).catch(function(){ setTimeout(loop,400); });
      })();
    }).catch(function(){ toast('No pude abrir la cámara. ¿Diste el permiso?'); cerrar(); });
  }
  function confirmarCierre(){
    var err=document.getElementById('cie-err'); err.textContent='';
    var o=CIE.o, btn=document.getElementById('cie-confirmar');
    var obsEl=document.getElementById('cie-obs'), obs=obsEl?obsEl.value.trim():'';
    if(CIE.accion==='NO_REALIZADA'){ var mEl=document.getElementById('cie-motivo'),mot=mEl?mEl.value:''; if(!mot){ err.textContent='Elegí un motivo.'; return; } if(!obs){ err.textContent='La observación es obligatoria.'; return; } CIE._motivo=mot; }
    if(CIE.fotos.some(function(f){return !f.url;})){ err.textContent='Esperá a que terminen de subir las fotos.'; return; }
    btn.disabled=true; btn.textContent='Guardando…';
    getGPS().then(function(g){
      var datos={}; each('.cie-dato',function(inp){ var v=inp.value.trim(); if(v) datos[inp.getAttribute('data-k')]=v; });
      var jobs=[], upd={ estado:(CIE.accion==='REALIZADA'?'CERRADA_TECNICO':'NO_REALIZADA'), fin_tec_at:new Date().toISOString(), observaciones_tec:obs||null };
      if(CIE.ttId) upd.tipo_trabajo_id=CIE.ttId;   // guarda el tipo de trabajo que eligió el técnico
      if(g){ upd.lat_fin=g.lat; upd.lng_fin=g.lng; }
      if(CIE.accion==='NO_REALIZADA') upd.motivo_cancelacion=CIE._motivo;
      jobs.push(sbPatch('ordenes_trabajo?id=eq.'+o.id,upd));
      // Historial de la OT (queda en el perfil del cliente, como todas las tareas)
      jobs.push(sbPost('ot_historial',{ ot_id:o.id, evento:(CIE.accion==='REALIZADA'?'CIERRE_TECNICO':'NO_REALIZADA'), estado_anterior:o.estado||null, estado_nuevo:upd.estado, cuadrilla_id:CUAD.id, cuadrilla_nombre:CUAD.nombre, detalle:(CIE.accion==='NO_REALIZADA'?('No realizada · '+CIE._motivo+(obs?(' · '+obs):'')):(obs||'Cierre del técnico')) }).catch(function(){}));
      // Última ubicación del cliente (GPS real medido en el lugar)
      if(g && CIE.o.clientes && CIE.o.clientes.id){ jobs.push(sbPatch('clientes?id=eq.'+CIE.o.clientes.id,{ lat:g.lat, lng:g.lng, geo_origen:'TECNICO' }).catch(function(){})); }
      if(CIE.accion==='REALIZADA'){
        var mats=[]; CIE.kitMat.forEach(function(m){ var s=CIE.mats[m.id]; if(!s)return; if(s.sel.length) s.sel.forEach(function(ser){ mats.push({ot_id:o.id,material_id:m.id,cantidad:1,serial:ser}); }); else if(s.cant>0) mats.push({ot_id:o.id,material_id:m.id,cantidad:s.cant,serial:null}); });
        if(mats.length) jobs.push(sbPost('ot_materiales',mats));
        var mos=[]; CIE.kitMo.forEach(function(m){ var c=CIE.mos[m.id]; if(c>0) mos.push({ot_id:o.id,mano_obra_id:m.id,nombre:m.nombre,cantidad:c}); });
        if(mos.length) jobs.push(sbPost('ot_mano_obra',mos));

  function _svFkey(which){ return 'firma'+(which==='tec'?'Tec':'Cli'); }
  function _initFirma(which){
    var c=document.getElementById('fp-'+which); if(!c) return; var ctx=c.getContext('2d'); ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.strokeStyle='#0f172a';
    var k=_svFkey(which);
    if(SV[k+'Data']){ var im=new Image(); im.onload=function(){ try{ ctx.drawImage(im,0,0,c.width,c.height); }catch(e){} }; im.src=SV[k+'Data']; }
    var drawing=false,last=null;
    function pos(e){ var r=c.getBoundingClientRect(),t=(e.touches&&e.touches[0])||e,sx=c.width/r.width,sy=c.height/r.height; return {x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy}; }
    c.addEventListener('pointerdown',function(e){ e.preventDefault(); drawing=true; last=pos(e); });
    c.addEventListener('pointermove',function(e){ if(!drawing)return; e.preventDefault(); var p=pos(e); ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p; SV[k+'Ink']=true; });
    function end(){ if(drawing){ drawing=false; try{ SV[k+'Data']=c.toDataURL('image/png'); }catch(e){} } }
    c.addEventListener('pointerup',end); c.addEventListener('pointerleave',end);
  }
  function _clearFirma(which){ var c=document.getElementById('fp-'+which); if(c){ c.getContext('2d').clearRect(0,0,c.width,c.height); } var k=_svFkey(which); SV[k+'Ink']=false; SV[k+'Data']=null; }

      var nombre=SV.o.id+'/firma_'+which+'_'+Date.now()+'.png';

        .then(function(r){ if(!r.ok) throw 0; res(SB_URL+'/storage/v1/object/public/ot-fotos/'+nombre); }).catch(function(){ res(null); });

  function confirmarCierreServ(){
    var err=document.getElementById('sv-err'); err.textContent='';
    var o=SV.o, btn=document.getElementById('sv-confirmar'), esFinal=(SV.tipoCierre==='FINAL');
    var ini=o.inicio_tec_at, fin=new Date().toISOString();   // inicio automático (al iniciar la tarea); fin = ahora
    if(!ini){ err.textContent='No se registró el inicio. Volvé y tocá «Iniciar tarea».'; return; }
    if(esFinal && !(SV.fotos.length+SV.fotosPrev.length)){ err.textContent='Para el cierre final subí al menos 1 foto.'; return; }
    if(SV.fotos.some(function(f){return !f.url;})){ err.textContent='Esperá a que terminen de subir las fotos.'; return; }
    btn.disabled=true; btn.textContent='Guardando…';
    Promise.all([esFinal?_uploadFirma('tec'):Promise.resolve(null), esFinal?_uploadFirma('cli'):Promise.resolve(null)]).then(function(firmas){
      getGPS().then(function(g){
        // La sesión (horas) es crítica para facturar: la guardo PRIMERO y verifico que quedó.
        sbPost('ot_sesiones',{ ot_id:o.id, cuadrilla_id:CUAD.id, inicio:ini, fin:fin, tipo:SV.tipoCierre, observaciones:SV._obs||null }).then(function(sr){
        if(!Array.isArray(sr)||!sr.length){ err.textContent='No se pudo guardar la sesión de horas. Reintentá.'; btn.disabled=false; btn.textContent=esFinal?'✔️ Confirmar cierre final':'⏸️ Guardar cierre parcial'; return; }
        var jobs=[];
        var upd={ observaciones_tec:SV._obs||null }; if(g){ upd.lat_fin=g.lat; upd.lng_fin=g.lng; }
        if(esFinal){ upd.estado='CERRADA_TECNICO'; upd.fin_tec_at=fin; upd.parcial=false; if(firmas[0]) upd.firma_tecnico_url=firmas[0]; if(firmas[1]) upd.firma_cliente_url=firmas[1];
          jobs.push(sbPost('ot_historial',{ ot_id:o.id, evento:'CIERRE_TECNICO', estado_anterior:o.estado||null, estado_nuevo:'CERRADA_TECNICO', cuadrilla_id:CUAD.id, cuadrilla_nombre:CUAD.nombre, detalle:(SV._obs||'Cierre final de servicio') }).catch(function(){}));
        } else { upd.estado='ASIGNADA'; upd.parcial=true;   // queda abierta para continuar (otro día o cuando llegue el material)
          jobs.push(sbPost('ot_historial',{ ot_id:o.id, evento:'CAMBIO_ESTADO', estado_anterior:o.estado||null, estado_nuevo:'ASIGNADA', cuadrilla_id:CUAD.id, cuadrilla_nombre:CUAD.nombre, detalle:'Cierre parcial · '+_hm(new Date(fin)-new Date(ini))+(SV._obs?(' · '+SV._obs):'') }).catch(function(){}));
        }
        jobs.push(sbPatch('ordenes_trabajo?id=eq.'+o.id,upd));
        SV.fotos.filter(function(f){return f.url;}).forEach(function(f){ jobs.push(sbPost('ot_fotos',{ot_id:o.id,url:f.url,tipo:'CIERRE'})); });
        Promise.all(jobs).then(function(){ toast(esFinal?'Cierre final guardado ✓':'Cierre parcial guardado ✓ (sigue abierta)'); SV=null; listState.filtro=(esFinal?'cerradas':'activas'); vLista(); }).catch(function(){ err.textContent='Error al guardar. Reintentá.'; btn.disabled=false; btn.textContent=esFinal?'✔️ Confirmar cierre final':'⏸️ Guardar cierre parcial'; });
        });   // cierra sbPost('ot_sesiones').then
      });
    });
  }

  // ════════ DESCONEXIONES (TODOS los cortes pendientes, por cercanía) ════════

  function vDescon(){
    app.innerHTML=topBar('Desconexiones','cortes pendientes')+'<div class="wrap">'
      +'<div class="card"><div class="muted" style="font-size:13px">TODOS los cortes pendientes. Tocá «Ordenar por cercanía» para ver primero los más cerca tuyo (aunque no sean de tu cuadrilla).</div>'

    wireTop();

  function cargarDescon(){
    sbGet('desconexiones?estado=in.(PENDIENTE,ASIGNADA)&clientes.estado=neq.eliminado&select=id,cliente_id,estado,cuadrilla_id,fecha_agendada,clientes!inner(id,numero_cliente,nombre,apellido,domicilio_full,barrio,telefono,caja_nap,puerto,precinto,lat,lng,codigo_ispcube)&limit=2000').then(function(d){
      d=Array.isArray(d)?d:[];
      desconState.list=d; renderDescon();
      _dxOrdenarGPS(true);   // intento automático de ordenar por cercanía (no bloquea la lista)
    }).catch(function(){ var r=document.getElementById('dx-res'); if(r)r.innerHTML='<div class="center">Error al cargar.</div>'; });
  }
  function _aplicarOrden(){
    var g=desconState.gps; if(!g||!desconState.list) return;
    desconState.list.forEach(function(o){ var c=o.clientes||{}; o._dist=(c.lat!=null&&c.lng!=null)?haversine(g.lat,g.lng,c.lat,c.lng):1e9; });
    desconState.list.sort(function(a,b){ return (a._dist==null?1e9:a._dist)-(b._dist==null?1e9:b._dist); });
    renderDescon();
  }
  function _dxOrdenarGPS(silent){
    var btn=document.getElementById('dx-cerca');
    function set(t,dis){ if(btn){ btn.disabled=!!dis; btn.textContent=t; } }
    if(!navigator.geolocation){ if(!silent) toast('Tu navegador no permite ubicación.'); return; }
    // NO usar Permissions API para frenar (devuelve "denied" de forma poco confiable en muchos celus):
    // pedimos la ubicación DIRECTO y manejamos el error real.
    set('📍 Buscando tu ubicación…',true);
    var done=false;
    var to=setTimeout(function(){ if(done)return; done=true; set('📍 Ordenar por cercanía',false); if(!silent) toast('La ubicación tardó demasiado. Reintentá.'); },21000);
    navigator.geolocation.getCurrentPosition(function(p){ if(done)return; done=true; clearTimeout(to);
      desconState.gps={lat:+p.coords.latitude.toFixed(6),lng:+p.coords.longitude.toFixed(6)};
      _aplicarOrden(); set('📍 Reordenar por cercanía',false); if(!silent) toast('Ordenado por cercanía ✓');
    },function(err){ if(done)return; done=true; clearTimeout(to); set('📍 Ordenar por cercanía',false);
      if(!silent){ if(err&&err.code===1) toast('Permiso de ubicación bloqueado. Tocá el 🔒 de la barra de direcciones y permití Ubicación, después reintentá.'); else toast('No pude obtener tu ubicación. Activá el GPS y reintentá.'); }
    },{enableHighAccuracy:true,timeout:20000,maximumAge:0});
  }
  function desconCard(o){
    var c=o.clientes||{}, nom=((c.nombre||'')+' '+(c.apellido||'')).trim();
    var dist=(o._dist!=null&&o._dist<1e8)?('<span class="badge-tt">'+(o._dist<1?(Math.round(o._dist*1000)+' m'):(o._dist.toFixed(1)+' km'))+'</span>'):'';
    var sinUbic=(c.lat==null||c.lng==null)?'<span class="badge-tt" style="background:#fee2e2;color:#991b1b">sin ubicación</span>':'';
    return '<div class="ot cli-card" data-id="'+o.id+'"><div class="h"><div><span class="num">N° '+esc(c.numero_cliente)+'</span> '+dist+' '+sinUbic+'</div></div>'
      +'<div class="cli">'+esc(nom)+'</div>'+(c.domicilio_full?'<div class="dir">📍 '+esc(c.domicilio_full)+'</div>':'')+(c.barrio?'<div class="dir">'+esc(c.barrio)+'</div>':'')
      +'<div class="dir" style="margin-top:4px">📦 Caja '+esc(c.caja_nap||'—')+' · Puerto '+esc(c.puerto||'—')+' · Precinto '+esc(c.precinto||'—')+'</div>'
      +'<div class="acc">'+((c.lat!=null||c.domicilio_full)?'<a class="btn btn-2 btn-sm" target="_blank" href="'+mapsUrl(c)+'">🚗 Ir</a>':'')
      +(c.telefono?'<a class="btn btn-2 btn-sm" href="tel:'+esc(String(c.telefono).replace(/[^\d+]/g,''))+'">📞</a><a class="btn btn-2 btn-sm" target="_blank" href="https://wa.me/'+waNum(c.telefono)+'">💬</a>':'')
      +'<button class="btn btn-ok btn-sm dx-cortar">✂️ Cortar</button></div></div>';
  }
  function renderDescon(){
    var res=document.getElementById('dx-res'); if(!res||!desconState.list) return;
    var q=desconState.q.toLowerCase().trim();
    var list=desconState.list.filter(function(o){ if(!q)return true; var c=o.clientes||{}; return (((c.nombre||'')+' '+(c.apellido||'')+' '+(c.barrio||'')+' '+(c.numero_cliente||'')+' '+(c.codigo_ispcube||'')+' '+(c.precinto||'')+' '+(c.caja_nap||'')+' '+(c.puerto||'')+' '+(c.telefono||'')+' '+(c.domicilio_full||'')).toLowerCase()).indexOf(q)>=0; });

    res.innerHTML='<div class="muted" style="margin:6px 0">'+list.length+' corte(s) pendiente(s)'+(desconState.gps?' · por cercanía':' · (activá el GPS para ordenar por cercanía)')+'</div>'+list.slice(0,150).map(desconCard).join('');

  var CORTE=null;
  function vCortar(o){ var c=(o&&o.clientes)?o.clientes:o; CORTE={ dx:(o&&o.id?o:null), c:c, fotos:[], recupero:true }; renderCortar(); }
  function renderCorteFotos(){ if(!CORTE.fotos.length) return '<span class="muted">Sin fotos.</span>'; return '<div style="display:flex;flex-wrap:wrap;gap:8px">'+CORTE.fotos.map(function(f,i){return '<div style="position:relative"><img src="'+f.preview+'" style="width:74px;height:74px;object-fit:cover;border-radius:8px"><button class="btn cofoto-del" data-i="'+i+'" style="position:absolute;top:-7px;right:-7px;width:22px;height:22px;padding:0;background:var(--rojo);color:#fff;border-radius:50%;line-height:1">×</button><div style="font-size:10px;text-align:center;color:'+(f.url?'var(--verde)':'var(--ambar)')+'">'+(f.url?'✓':'…')+'</div></div>';}).join('')+'</div>'; }

      +'<div class="err" id="co-err"></div>'

  function subirCorteFotos(files){
    Array.prototype.forEach.call(files,function(file){
      comprimir(file).then(function(blob){
        var f={ preview:URL.createObjectURL(blob), url:null }; CORTE.fotos.push(f); renderCortar();
        var nombre='descon/'+CORTE.c.id+'/'+Date.now()+'_'+Math.floor(Math.random()*1000)+'.jpg';
        fetch(SB_URL+'/storage/v1/object/ot-fotos/'+nombre,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'image/jpeg','x-upsert':'true'},body:blob})
          .then(function(r){ if(!r.ok)throw 0; f.url=SB_URL+'/storage/v1/object/public/ot-fotos/'+nombre; renderCortar(); })
          .catch(function(){ toast('No se pudo subir la foto (¿bucket ot-fotos?)'); });
      });
    });

  function confirmarCorte(){
    var c=CORTE.c, err=document.getElementById('co-err'); err.textContent='';
    if(CORTE.fotos.some(function(f){return !f.url;})){ err.textContent='Esperá que terminen de subir las fotos.'; return; }
    var btn=document.getElementById('co-confirmar'); btn.disabled=true; btn.textContent='Cortando…';
    var serial=document.getElementById('co-serial').value.trim(), obs=document.getElementById('co-obs').value.trim();
    if(CORTE.recupero&&!serial){ err.textContent='Poné el serial/MAC del equipo recuperado (o marcá «No» en recupero).'; btn.disabled=false; btn.textContent='✂️ Confirmar corte'; return; }
    getGPS().then(function(g){
      var cierre={ estado:'PENDIENTE_ADMIN', cuadrilla_id:CUAD.id, recupero_equipo:!!CORTE.recupero, equipo_serial:serial||null, caja_nap:c.caja_nap||null, puerto:c.puerto||null, precinto:c.precinto||null, obs_tecnico:obs||null, foto_url:(CORTE.fotos[0]?CORTE.fotos[0].url:null), corte_at:new Date().toISOString(), cerrado_por:CUAD.id, updated_at:new Date().toISOString() };
      if(g){ cierre.lat=g.lat; cierre.lng=g.lng; }
      var dxId=CORTE.dx&&CORTE.dx.id;
      // si vino de una orden asignada → cierra esa orden; si no, crea una ya cerrada (compat)
      var main = dxId ? sbPatch('desconexiones?id=eq.'+dxId,cierre)
                      : sbPost('desconexiones',Object.assign({cliente_id:c.id,cuadrilla_id:CUAD.id,origen:'manual'},cierre));
      var jobs=[ main, sbPatch('clientes?id=eq.'+c.id,{estado:'desconectado'}) ];
      if(CORTE.recupero&&serial) jobs.push(sbPatch('stock_seriales?serial=eq.'+encodeURIComponent(serial),{estado:'EN_CUADRILLA',cuadrilla_id:CUAD.id,cliente_id:null}));
      Promise.all(jobs).then(function(){ toast('Corte registrado ✓ — pasa a administrativo'); if(desconState.list) desconState.list=desconState.list.filter(function(x){return !(x.id===dxId);}); CORTE=null; vDescon(); }).catch(function(){ err.textContent='Error al registrar el corte.'; btn.disabled=false; btn.textContent='✂️ Confirmar corte'; });
    });
  }
  // El cliente dice que va a pagar → no se corta, se anula la orden y se deja el servicio
  function cortePago(){
    var c=CORTE.c, err=document.getElementById('co-err'); err.textContent='';
    var nota=document.getElementById('co-obs').value.trim();
    if(!confirm('El cliente va a abonar: NO se corta y se deja el servicio. ¿Confirmás?')) return;
    var btn=document.getElementById('co-pago'); btn.disabled=true; btn.textContent='Registrando…';
    var dxId=CORTE.dx&&CORTE.dx.id;
    var cuerpo={ estado:'ANULADA_PAGO', resolucion:'El cliente dice que va a abonar (en la visita)'+(nota?(' — '+nota):''), resuelto_at:new Date().toISOString(), cerrado_por:CUAD.id, updated_at:new Date().toISOString() };
    var main = dxId ? sbPatch('desconexiones?id=eq.'+dxId,cuerpo)
                    : sbPost('desconexiones',Object.assign({cliente_id:c.id,cuadrilla_id:CUAD.id,origen:'manual'},cuerpo));
    main.then(function(){ toast('🟢 Registrado — el cliente sigue con servicio'); if(desconState.list&&dxId) desconState.list=desconState.list.filter(function(x){return !(x.id===dxId);}); CORTE=null; vDescon(); }).catch(function(){ err.textContent='No se pudo registrar.'; btn.disabled=false; btn.textContent='🟢 El cliente va a abonar — no cortar'; });
  }

  iniciar();
</script>
